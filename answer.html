<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客満足度調査 2025 — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #5b52e8;
  --accent-light: #ede9ff;
  --danger: #e24b4a;
  --success: #22a06b;
  --bg: #f4f3f8;
  --surface: #ffffff;
  --surface2: #f8f7fc;
  --border: rgba(0,0,0,0.08);
  --text: #1a1825;
  --text2: #6b677e;
  --text3: #aba8bb;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 16px rgba(91,82,232,0.08);
  --shadow-lg: 0 8px 40px rgba(91,82,232,0.13);
  --font: 'DM Sans','Noto Sans JP',sans-serif;
  --header: #5b52e8;
  --btn: #5b52e8;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
.survey-header {
  background:var(--header);
  color:#fff;
  padding:32px 40px 28px;
  text-align:center;
}
.survey-header h1 { font-size:24px; font-weight:500; margin-bottom:8px; }
.survey-header p { font-size:13px; opacity:.75; line-height:1.6; max-width:860px; margin:0 auto 14px; }
.progress-wrap { max-width:860px; margin:0 auto; }
.progress-bar { height:4px; background:rgba(255,255,255,.25); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#fff; border-radius:2px; transition:width .4s ease; }
.progress-label { font-size:11px; opacity:.65; margin-top:5px; text-align:right; }

/* ── BODY ── */
.survey-body { max-width:900px; margin:0 auto; padding:36px 40px 80px; }

/* ── QUESTION CARD ── */
.q-block {
  background:var(--surface); border-radius:var(--radius);
  padding:28px 32px; margin-bottom:16px;
  box-shadow:var(--shadow); border:1px solid var(--border);
  animation:fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.q-label { font-size:16px; font-weight:500; color:var(--text); margin-bottom:16px; line-height:1.6; }
.q-required { color:var(--danger); font-size:13px; margin-left:3px; }
.q-desc { font-size:13px; color:var(--text2); margin-top:-8px; margin-bottom:12px; line-height:1.6; }

/* description block */
.desc-block {
  background:var(--surface); border-radius:var(--radius);
  padding:26px 32px; margin-bottom:16px;
  border-left:4px solid var(--accent);
  box-shadow:var(--shadow);
}
.desc-block p { font-size:15px; color:var(--text2); line-height:1.8; }

/* inputs */
.field { width:100%; padding:13px 16px; border-radius:var(--radius-sm); border:1.5px solid var(--border); font-size:15px; font-family:var(--font); background:var(--surface2); color:var(--text); outline:none; transition:border-color .15s; }
.field:focus { border-color:var(--accent); background:var(--surface); }
textarea.field { resize:vertical; min-height:100px; }

/* radio / checkbox */
.choice-list { display:flex; flex-direction:column; gap:9px; }
.choice-item { display:flex; align-items:center; gap:13px; padding:14px 18px; border-radius:var(--radius-sm); border:1.5px solid var(--border); cursor:pointer; transition:all .15s; background:var(--surface2); }
.choice-item:hover { border-color:var(--accent); background:var(--accent-light); }
.choice-item.selected { border-color:var(--accent); background:var(--accent-light); }
.choice-item input { accent-color:var(--btn); width:16px; height:16px; flex-shrink:0; }
.choice-item span { font-size:15px; color:var(--text); }

/* scale */
.scale-row { display:flex; justify-content:space-between; gap:6px; margin-bottom:6px; }
.scale-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:13px 6px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
  cursor:pointer; transition:all .15s; background:var(--surface2);
}
.scale-btn:hover { border-color:var(--accent); background:var(--accent-light); }
.scale-btn.selected { border-color:var(--accent); background:var(--accent); color:#fff; }
.scale-btn.selected .scale-num { color:#fff; }
.scale-num { font-size:15px; font-weight:600; color:var(--text2); }
.scale-labels { display:flex; justify-content:space-between; margin-top:2px; }
.scale-labels span { font-size:11px; color:var(--text3); max-width:45%; line-height:1.4; }
.scale-labels span:last-child { text-align:right; }

/* ranking */
.ranking-list { display:flex; flex-direction:column; gap:8px; }
.rank-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:var(--radius-sm);
  border:1.5px solid var(--border); background:var(--surface2);
  cursor:grab; transition:all .15s; user-select:none;
}
.rank-item:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(91,82,232,.1); }
.rank-item.dragging { opacity:.35; }
.rank-item.drag-over { border-color:var(--accent); border-style:dashed; }
.rank-num {
  min-width:26px; height:26px; border-radius:7px;
  background:var(--accent-light); color:var(--accent);
  font-size:13px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.rank-item.dragging + .rank-item .rank-num,
.rank-item.selected .rank-num { background:var(--accent); color:#fff; }
.rank-label { flex:1; font-size:14px; color:var(--text); }
.rank-grip { color:var(--text3); }
.rank-grip svg { width:14px; height:14px; display:block; }
.rank-hint { font-size:11px; color:var(--text3); margin-top:6px; text-align:center; }

/* matrix */
.matrix-wrap { overflow-x:auto; }
.matrix-table {
  border-collapse:collapse; width:100%; font-size:14px;
  table-layout:fixed;
}
/* 最初の列（矢印列）は固定幅、残りは均等 */
.matrix-table col.col-arrow { width:48px; }
.matrix-table col.col-choice { width:auto; }
/* ヘッダーセル */
.matrix-th {
  text-align:center; padding:10px 4px 14px;
  font-size:13px; font-weight:500; color:var(--text2);
  vertical-align:bottom; line-height:1.4;
  /* 2行固定 */
  display:table-cell;
  overflow:hidden;
}
.matrix-th .th-inner {
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
  line-height:1.4;
  min-height:calc(1.4em * 2);
  height:calc(1.4em * 2);
  word-break:break-all;
  overflow-wrap:anywhere;
}
.matrix-th-arrow { width:48px; }
/* サブ設問行（テキスト） */
.matrix-row-label {
  font-size:14px; color:var(--text); line-height:1.5;
  padding:12px 8px 6px 4px;
}
.matrix-row-num { font-weight:700; color:var(--accent); margin-right:5px; }
/* ラジオ/チェック行 */
.matrix-arrow-cell {
  text-align:center; font-size:16px; color:var(--accent);
  padding:4px 0 12px; vertical-align:middle;
}
.matrix-radio-cell {
  text-align:center; vertical-align:middle;
  padding:4px 2px 12px;
}
.matrix-radio-cell input { accent-color:var(--btn); width:18px; height:18px; cursor:pointer; display:block; margin:0 auto; }
.matrix-separator { height:1px; background:var(--border); }

/* submit */
.submit-area { margin-top:28px; text-align:center; }

/* page navigation */
.page-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 36px; gap: 12px; flex-wrap: wrap;
}
.btn-nav {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
  cursor: pointer; font-family: var(--font); transition: all .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.btn-nav:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-next { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 14px rgba(91,82,232,.25); }
.btn-next:hover { background: #4a42d4; border-color: #4a42d4; box-shadow: 0 6px 20px rgba(91,82,232,.3); }
.page-dots { display: flex; gap: 6px; align-items: center; flex: 1; justify-content: center; }
.page-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); border: none; cursor: pointer;
  transition: all .2s; padding: 0;
}
.page-dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
.page-dot.done { background: var(--accent); opacity: .45; }
.btn-submit {
  display:inline-block; padding:15px 48px; border-radius:10px;
  background:var(--btn); color:#fff; font-size:16px; font-weight:500;
  border:none; cursor:pointer; font-family:var(--font);
  transition:all .15s; box-shadow:0 4px 14px rgba(91,82,232,.25);
}
.btn-submit:hover { background:#4a42d4; transform:translateY(-1px); box-shadow:0 6px 20px rgba(91,82,232,.3); }
.btn-submit:active { transform:translateY(0); }
.btn-submit:disabled { background:var(--text3); box-shadow:none; cursor:not-allowed; transform:none; }
.required-note { font-size:12px; color:var(--text3); margin-bottom:20px; }

/* complete */
.complete-screen { display:none; text-align:center; padding:80px 40px; max-width:900px; margin:0 auto; }
.complete-icon { width:64px; height:64px; border-radius:50%; background:#e4f9f1; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
.complete-icon svg { width:32px; height:32px; color:#22a06b; }
.complete-screen h2 { font-size:22px; font-weight:500; color:var(--text); margin-bottom:10px; }
.complete-screen p { font-size:14px; color:var(--text2); line-height:1.7; }
.error-msg { font-size:12px; color:var(--danger); margin-top:6px; display:none; }
.field.error { border-color:var(--danger); }
</style>
</head>
<body>

<div class="survey-header" style="position:relative;">
    <h1>顧客満足度調査 2025</h1>
  <p>このアンケートは当社サービスの品質向上を目的としています。ご協力をよろしくお願いいたします。</p>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 6 問</div>
  </div>
</div>

<div class="survey-body" id="surveyBody" style="display:none;">
  <p class="required-note">* は必須回答です</p>
  <div id="dynamicQuestions"></div>

  <!-- ページナビゲーション -->
  <div class="page-nav" id="pageNav">
    <button class="btn-nav btn-prev" id="prevBtn" onclick="goPrev()" style="display:none;">
      <svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px;"><path d="M10 4L6 8l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      前へ
    </button>
    <div class="page-dots" id="pageDots"></div>
    <button class="btn-nav btn-next" id="nextBtn" onclick="goNext()">
      次へ
      <svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px;"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn-submit" id="submitBtn" onclick="submitSurvey()" style="display:none;">送信する</button>
  </div>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="completeScreen" style="display:none;">
  <div style="margin-bottom:16px;">
    <a href="list.html" style="display:none;"></a>
  </div>
  <div class="complete-icon">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/><path d="M10 16l4.5 4.5L22 11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h2>ご回答ありがとうございました！</h2>
  <p>いただいたご意見はサービス改善に活用させていただきます。<br>引き続きよろしくお願いいたします。</p>
</div>

<script>
// ============================================================
// ページ分割ナビゲーション + 条件分岐スキップ
// ============================================================

// Supabase設定
const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
async function sbPost(path, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method: 'POST',
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

const SURVEY_ID = new URLSearchParams(location.search).get('survey') || null;

// ── ページ・分岐の状態管理 ──
// pages[i] = [ questionIndex, ... ]  （page_break設問を除いた論理ページ）
// branchRules = [ { sourceQIdx, condition, value, targetPageIdx | 'end' }, ... ]
let pages = [[]];
let branchRules = [];
let currentPage = 0;
let totalQ = 0;  // page_break / branch / cover / description / image / url / video を除いた回答設問数

// 現在のページで表示すべきページインデックスの配列（スキップ済を考慮した訪問順）
let pageHistory = [0];

// ── 選択UI ──
function selectChoice(el, groupId) {
  document.querySelectorAll(`#${groupId} .choice-item`).forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
  updateProgress();
}
function toggleCheck(el) {
  el.classList.toggle('selected');
  el.querySelector('input').checked = el.classList.contains('selected');
  updateProgress();
}
function selectScale(el, groupId, val) {
  document.querySelectorAll(`#${groupId} .scale-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.val = val;
  updateProgress();
}

// ── プログレスバー（表示中ページ内の回答率） ──
function updateProgress() {
  const visibleBlocks = getVisibleBlocks();
  const answered = visibleBlocks.filter(b => isAnswered(b)).length;
  const total = visibleBlocks.filter(b => b.dataset.required === 'true').length || visibleBlocks.length || 1;
  // 全体進捗：訪問済みページ / 全ページ数
  const globalPct = pages.length <= 1
    ? (answered / Math.max(totalQ, 1) * 100)
    : ((currentPage) / pages.length * 100 + (answered / Math.max(visibleBlocks.length,1)) / pages.length * 100);
  document.getElementById('progressFill').style.width = Math.min(globalPct, 95) + '%';
  const pageQs = visibleBlocks.length;
  const answeredAll = countAllAnswered();
  document.getElementById('progressLabel').textContent = `${answeredAll} / ${totalQ} 問`;
}

function countAllAnswered() {
  return [...document.querySelectorAll('.q-block')].filter(b => !b.classList.contains('page-hidden') && isAnswered(b)).length;
}

function isAnswered(b) {
  const input = b.querySelector('input[type=text],input[type=number]');
  const area  = b.querySelector('textarea');
  const sel   = b.querySelector('select');
  const radio = b.querySelector('input[type=radio]:checked');
  const check = b.querySelector('input[type=checkbox]:checked');
  const scale = b.querySelector('.scale-btn.selected');
  return !!(input?.value || area?.value || sel?.value || radio || check || scale);
}

function getVisibleBlocks() {
  return [...document.querySelectorAll('.q-block')].filter(b => !b.classList.contains('page-hidden'));
}

// ── バリデーション（現在ページのみ） ──
function validateCurrentPage() {
  let ok = true;
  getVisibleBlocks().forEach(b => {
    if(b.dataset.required !== 'true') return;
    const errEl = document.getElementById(`err_${b.dataset.qid}`);
    if(!isAnswered(b)) {
      if(errEl) errEl.style.display = 'block';
      ok = false;
    } else {
      if(errEl) errEl.style.display = 'none';
    }
  });
  if(!ok) {
    const first = document.querySelector('.error-msg[style*="block"]');
    first?.closest('.q-block')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

// ── 条件分岐：現在の回答から次のページを決定 ──
function resolveNextPage() {
  // currentPage のブロックから回答を取得
  const pageQIndices = pages[currentPage] || [];
  for(const rule of branchRules) {
    if(rule.sourcePage !== currentPage) continue;
    // 対象設問の回答値を取得
    const qid = `dq_${rule.sourceQIdx}`;
    const block = document.querySelector(`.q-block[data-qid="${qid}"]`);
    if(!block) continue;
    const radio = block.querySelector('input[type=radio]:checked');
    const sel   = block.querySelector('select');
    const curVal = radio?.value || sel?.value || '';
    if(!curVal) continue;
    // 条件マッチチェック
    if(rule.value === curVal || rule.value === '*') {
      if(rule.target === 'end') return 'end';
      if(typeof rule.target === 'number') return rule.target;
    }
  }
  return currentPage + 1;
}

// ── ページ表示切替 ──
function showPage(pageIdx) {
  currentPage = pageIdx;
  // 全ブロックを一旦隠す
  document.querySelectorAll('.q-block, .desc-block, [data-cover]').forEach(el => {
    el.classList.add('page-hidden');
    el.style.display = 'none';
  });
  // 今のページのブロックを表示
  const indices = pages[pageIdx] || [];
  indices.forEach(qi => {
    const el = document.querySelector(`[data-page-qi="${qi}"]`);
    if(el) { el.classList.remove('page-hidden'); el.style.display = ''; }
  });
  // ボタン制御
  const prevBtn  = document.getElementById('prevBtn');
  const nextBtn  = document.getElementById('nextBtn');
  const submitBtn= document.getElementById('submitBtn');
  const isFirst  = pageHistory.length <= 1;
  const isLast   = pageIdx >= pages.length - 1;
  prevBtn.style.display  = isFirst ? 'none' : '';
  nextBtn.style.display  = isLast  ? 'none' : '';
  submitBtn.style.display = isLast ? '' : 'none';
  // ドット更新
  renderDots();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDots() {
  const dotsEl = document.getElementById('pageDots');
  if(pages.length <= 1) { dotsEl.innerHTML = ''; return; }
  dotsEl.innerHTML = pages.map((_, i) => {
    const cls = i === currentPage ? 'active' : (pageHistory.includes(i) ? 'done' : '');
    return `<button class="page-dot ${cls}" onclick="jumpToPage(${i})" title="${i+1}ページ"></button>`;
  }).join('');
}

function jumpToPage(idx) {
  // 訪問済みページのみジャンプ可
  if(!pageHistory.includes(idx) && idx !== currentPage) return;
  currentPage = idx;
  // historyを切り詰め
  const pos = pageHistory.indexOf(idx);
  if(pos >= 0) pageHistory = pageHistory.slice(0, pos + 1);
  showPage(idx);
}

// ── 次へ ──
function goNext() {
  if(!validateCurrentPage()) return;
  const next = resolveNextPage();
  if(next === 'end') {
    // 強制終了（分岐）
    submitSurvey();
    return;
  }
  if(next >= pages.length) {
    submitSurvey();
    return;
  }
  if(!pageHistory.includes(next)) pageHistory.push(next);
  else pageHistory = [...pageHistory, next];
  showPage(next);
}

// ── 前へ ──
function goPrev() {
  if(pageHistory.length <= 1) return;
  pageHistory.pop();
  const prev = pageHistory[pageHistory.length - 1];
  showPage(prev);
}

// ── 送信 ──
async function submitSurvey() {
  // 全ページのバリデーション
  let allOk = true;
  for(const pi of pageHistory) {
    const indices = pages[pi] || [];
    indices.forEach(qi => {
      const el = document.querySelector(`.q-block[data-page-qi="${qi}"]`);
      if(!el || el.dataset.required !== 'true') return;
      const errEl = document.getElementById(`err_${el.dataset.qid}`);
      if(!isAnswered(el)) {
        if(errEl) errEl.style.display = 'block';
        allOk = false;
      }
    });
  }
  if(!allOk) {
    // 最初のエラーページへ
    for(const pi of pageHistory) {
      const indices = pages[pi] || [];
      let found = false;
      for(const qi of indices) {
        const el = document.querySelector(`.q-block[data-page-qi="${qi}"]`);
        if(el && el.dataset.required === 'true' && !isAnswered(el)) {
          showPage(pi);
          setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'center' }), 100);
          found = true; break;
        }
      }
      if(found) break;
    }
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    if(SURVEY_ID) {
      const [response] = await sbPost('responses', {
        survey_id: SURVEY_ID, completed: true, finished_at: new Date().toISOString()
      });

      const answers = [];
      const surveyQuestions = window._surveyQuestions || [];
      document.querySelectorAll('.q-block').forEach((b) => {
        const qi = parseInt(b.dataset.pageQi);
        const dbQ = surveyQuestions[qi];
        if(!dbQ) return;
        const radio  = b.querySelector('input[type=radio]:checked');
        const checks = [...b.querySelectorAll('input[type=checkbox]:checked')];
        const scale  = b.querySelector('.scale-btn.selected');
        const select = b.querySelector('select');
        const text   = b.querySelector('input[type=text],textarea');
        const ranks  = [...b.querySelectorAll('.rank-label')].map(l=>l.textContent);
        let value = '', values = [];
        if(radio)              value = radio.value;
        else if(checks.length) { values = checks.map(c=>c.value); value = values.join(','); }
        else if(scale)         value = scale.dataset.val || '';
        else if(select?.value) value = select.value;
        else if(text?.value)   value = text.value;
        else if(ranks.length)  { values = ranks; value = ranks.join(','); }
        if(value || values.length) answers.push({ response_id: response.id, question_id: dbQ.id, value, values });
      });

      if(answers.length) await sbPost('answers', answers);
    }

    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = `完了`;
    document.getElementById('surveyBody').style.display = 'none';
    document.getElementById('completeScreen').style.display = 'block';
    document.querySelector('.survey-header').style.display = 'none';
  } catch(e) {
    console.error('submit error:', e);
    const errDiv = document.createElement('div');
    errDiv.textContent = '送信エラー: ' + e.message;
    errDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e24b4a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;';
    document.body.appendChild(errDiv);
    setTimeout(()=>errDiv.remove(), 4000);
    btn.disabled = false; btn.textContent = '送信する';
  }
}

// ── DBからアンケートを読み込んでレンダリング ──
async function loadSurveyInfo() {
  if(!SURVEY_ID) {
    document.getElementById('surveyBody').style.display = 'block';
    showPage(0);
    return;
  }
  try {
    const get = path => fetch(`${SB_URL}/rest/v1/${path}`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    }).then(r => r.json());

    const [survey] = await get(`surveys?id=eq.${SURVEY_ID}&select=*`);
    if(!survey) {
      document.querySelector('.survey-header h1').textContent = 'アンケートが見つかりません';
      return;
    }
    document.querySelector('.survey-header h1').textContent = survey.title;
    document.querySelector('.survey-header p').textContent  = survey.description || '';
    if(survey.header_color) document.querySelector('.survey-header').style.background = survey.header_color;
    const submitBtn = document.getElementById('submitBtn');
    if(submitBtn && survey.btn_color) {
      submitBtn.style.background = survey.btn_color;
      document.querySelectorAll('.btn-next').forEach(b => b.style.background = survey.btn_color);
    }
    document.title = `${survey.title} — Survey Builder`;

    window._surveyQuestions = await get(`questions?survey_id=eq.${SURVEY_ID}&select=*,options(*)&order=position`);
    const questions = window._surveyQuestions;
    const container = document.getElementById('dynamicQuestions');

    // ── ページ・分岐の構築 ──
    pages = [[]];
    branchRules = [];
    let pageIdx = 0;
    let qAnswerIdx = 0; // 回答設問の通し番号（page_break/desc/cover 除く）

    const NON_ANSWER_TYPES = new Set(['description','cover','image','url','video','page_break','branch']);

    const htmlParts = questions.map((q, qi) => {
      const choices = (q.options||[]).filter(o=>o.option_type==='choice').sort((a,b)=>a.position-b.position);
      const qid = `dq_${qi}`;
      const req = q.required ? '<span class="q-required">*</span>' : '';

      // ── page_break ──
      if(q.type === 'page_break') {
        pageIdx++;
        pages.push([]);
        return `<!-- page_break qi=${qi} -->`;
      }

      // ── branch ──
      if(q.type === 'branch') {
        const rules = q.settings?.rules || [];
        rules.forEach(r => {
          // r = { sourceQIdx (position in questions), value, target (pageIdx or 'end') }
          branchRules.push({
            sourcePage: pageIdx,
            sourceQIdx: r.sourceQIdx,
            value: r.value,
            target: r.target
          });
        });
        return `<!-- branch qi=${qi} -->`;
      }

      // ── description ──
      if(q.type === 'description') {
        const text = (q.settings&&q.settings.text)||q.title||'';
        pages[pageIdx].push(qi);
        return `<div class="desc-block" data-page-qi="${qi}" style="display:none;"><p>${text}</p></div>`;
      }

      // ── cover ──
      if(q.type === 'cover') {
        const coverBody  = q.settings?.coverBody     || '';
        const btnLabel   = q.settings?.coverBtnLabel || '';
        const style = q.settings?.coverStyle || 'white';
        const bg = style==='accent' ? 'linear-gradient(135deg,#5b52e8,#7c75ef)'
                 : style==='light'  ? '#f4f3f8' : '#ffffff';
        const color    = style==='accent' ? '#fff'                  : 'var(--text)';
        const subColor = style==='accent' ? 'rgba(255,255,255,.85)' : 'var(--text2)';
        pages[pageIdx].push(qi);
        return `<div data-cover="1" data-page-qi="${qi}" style="display:none;background:${bg};border-radius:12px;padding:28px 24px;margin-bottom:16px;border:1px solid rgba(0,0,0,.06);">
          ${q.title   ? `<div style="font-size:20px;font-weight:700;color:${color};margin-bottom:${coverBody?'14px':'0'};line-height:1.4;">${q.title}</div>` : ''}
          ${coverBody ? `<div style="font-size:14px;color:${subColor};line-height:1.9;white-space:pre-wrap;">${coverBody}</div>` : ''}
          ${btnLabel  ? `<div style="margin-top:20px;"><button onclick="goNext()" style="display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;">${btnLabel} →</button></div>` : ''}
        </div>`;
      }

      // ── image ──
      if(q.type === 'image') {
        const imgUrl = q.settings?.imageUrl || '';
        const desc   = q.settings?.desc     || '';
        pages[pageIdx].push(qi);
        return `<div class="q-block" data-page-qi="${qi}" data-required="false" data-qid="${qid}" style="display:none;">
          ${imgUrl ? `<img src="${imgUrl}" style="width:100%;border-radius:8px;margin-bottom:10px;" />` : ''}
          ${desc   ? `<p style="font-size:14px;color:var(--text2);line-height:1.6;">${desc}</p>` : ''}
        </div>`;
      }

      // ── url ──
      if(q.type === 'url') {
        const href = q.settings?.url || q.url || '#';
        const label = q.settings?.linkText || href;
        pages[pageIdx].push(qi);
        return `<div class="q-block" data-page-qi="${qi}" data-required="false" data-qid="${qid}" style="display:none;">
          <a href="${href}" target="_blank" style="color:var(--accent);text-decoration:underline;font-size:14px;">🔗 ${label}</a>
        </div>`;
      }

      // ── video ──
      if(q.type === 'video') {
        const url = q.settings?.url || '';
        const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
        const inner = ytMatch
          ? `<div style="position:relative;padding-bottom:56.25%;border-radius:8px;overflow:hidden;background:#000;"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" style="position:absolute;inset:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>`
          : (url ? `<p style="font-size:14px;color:var(--text2);">🎬 ${url}</p>` : '');
        pages[pageIdx].push(qi);
        return `<div class="q-block" data-page-qi="${qi}" data-required="false" data-qid="${qid}" style="display:none;">${inner}</div>`;
      }

      // ── 回答設問 ──
      pages[pageIdx].push(qi);
      totalQ++;
      qAnswerIdx++;
      const qNumLabel = `<span style="font-weight:700;color:var(--accent);margin-right:6px;">Q${qAnswerIdx}</span>`;
      let inner = '';

      if(q.type === 'text') {
        inner = `<input class="field" id="${qid}" placeholder="回答を入力..." oninput="updateProgress()" />`;
      } else if(q.type === 'textarea') {
        inner = `<textarea class="field" id="${qid}" placeholder="回答を入力..." oninput="updateProgress()"></textarea>`;
      } else if(q.type === 'select') {
        inner = `<select class="field" id="${qid}" onchange="updateProgress()">
          <option value="">選択してください...</option>
          ${choices.map(o=>`<option value="${escHtml(o.label)}">${escHtml(o.label)}</option>`).join('')}
        </select>`;
      } else if(q.type === 'radio') {
        inner = `<div class="choice-list" id="${qid}">
          ${choices.map(o=>`<label class="choice-item" onclick="selectChoice(this,'${qid}')">
            <input type="radio" name="${qid}" value="${escHtml(o.label)}" /><span>${escHtml(o.label)}</span>
          </label>`).join('')}
        </div>`;
      } else if(q.type === 'checkbox') {
        inner = `<div class="choice-list" id="${qid}">
          ${choices.map(o=>`<label class="choice-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="${escHtml(o.label)}" /><span>${escHtml(o.label)}</span>
          </label>`).join('')}
        </div>`;
      } else if(q.type === 'scale') {
        const s = q.settings || {};
        const min = s.min || 1, max = s.max || 5;
        const steps = Array.from({length: max-min+1}, (_,i)=>i+min);
        inner = `<div>
          <div class="scale-row" id="${qid}">
            ${steps.map(n=>`<div class="scale-btn" onclick="selectScale(this,'${qid}',${n})"><span class="scale-num">${n}</span></div>`).join('')}
          </div>
          <div class="scale-labels">
            <span>${escHtml(s.minLabel||'')}</span><span>${escHtml(s.maxLabel||'')}</span>
          </div>
        </div>`;
      } else if(q.type === 'ranking') {
        inner = `<div class="ranking-list" id="${qid}" ondragover="rankDragOver(event,'${qid}')" ondrop="rankDrop(event,'${qid}')">
          ${choices.map((o,i)=>`<div class="rank-item" draggable="true" ondragstart="rankDragStart(event)">
            <span class="rank-num">${i+1}</span>
            <span class="rank-label">${escHtml(o.label)}</span>
            <span class="rank-grip"><svg viewBox="0 0 12 12" fill="none"><circle cx="4" cy="2.5" r="1" fill="currentColor"/><circle cx="8" cy="2.5" r="1" fill="currentColor"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="8" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="9.5" r="1" fill="currentColor"/><circle cx="8" cy="9.5" r="1" fill="currentColor"/></svg></span>
          </div>`).join('')}
          <p class="rank-hint">⠿ をドラッグして順番を入れ替えてください</p>
        </div>`;
      } else if(q.type === 'matrix' || q.type === 'matrix_multi') {
        const cols = (q.options||[]).filter(o=>o.option_type==='matrix_col').sort((a,b)=>a.position-b.position);
        const rows = (q.options||[]).filter(o=>o.option_type==='matrix_row').sort((a,b)=>a.position-b.position);
        const interval = q.settings?.interval || 5;
        const isMulti  = q.type === 'matrix_multi';

        // colgroup: 矢印列 固定48px + 選択肢列は均等（auto）
        const colgroup = `<colgroup>
          <col class="col-arrow" />
          ${cols.map(()=>`<col class="col-choice" />`).join('')}
        </colgroup>`;

        // ヘッダー行：各セル同じ幅・中央揃え・折り返し
        const headerRow = () => `<tr>
          <th class="matrix-th matrix-th-arrow"></th>
          ${cols.map(c=>`<th class="matrix-th"><div class="th-inner">${escHtml(c.label)}</div></th>`).join('')}
        </tr>`;

        let tbl = `<div class="matrix-wrap"><table class="matrix-table">${colgroup}`;
        rows.forEach((row, ri) => {
          if(ri===0 || ri%interval===0) tbl += headerRow();
          const bg = ri%2===0 ? 'var(--surface)' : '#f1f0f8';
          const inputEl = isMulti
            ? `<input type="checkbox" style="accent-color:var(--accent);" name="${qid}_r${ri}" />`
            : `<input type="radio"    style="accent-color:var(--accent);" name="${qid}_r${ri}" />`;

          // テキスト行（colspan全幅）
          tbl += `<tr style="background:${bg};">
            <td colspan="${cols.length+1}" class="matrix-row-label">
              <span class="matrix-row-num">${ri+1}.</span>${escHtml(row.label)}
            </td>
          </tr>`;

          // ラジオ行（等間隔）
          tbl += `<tr style="background:${bg};">
            <td class="matrix-arrow-cell">⇒</td>
            ${cols.map(()=>`<td class="matrix-radio-cell">${inputEl}</td>`).join('')}
          </tr>`;

          if(ri < rows.length-1) tbl += `<tr class="matrix-separator"><td colspan="${cols.length+1}"></td></tr>`;
        });
        tbl += `</table></div>`;
        inner = tbl;
      }

      return `<div class="q-block" data-page-qi="${qi}" data-qid="${qid}" data-required="${q.required}" style="display:none;">
        <div class="q-label">${qNumLabel}${escHtml(q.title||'')} ${req}</div>
        ${inner}
        ${q.required?`<div class="error-msg" id="err_${qid}">この設問は必須です</div>`:''}
      </div>`;
    });

    container.innerHTML = htmlParts.join('');
    document.getElementById('progressLabel').textContent = `0 / ${totalQ} 問`;
    document.getElementById('surveyBody').style.display = 'block';
    showPage(0);
  } catch(e) {
    console.error('loadSurveyInfo error:', e);
    document.getElementById('surveyBody').style.display = 'block';
    showPage(0);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadSurveyInfo();

// ── ランキングD&D ──
let rankDragSrc = null;
function rankDragStart(e) {
  rankDragSrc = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain','rank');
  setTimeout(() => rankDragSrc?.classList.add('dragging'), 0);
}
function rankDragOver(e, listId) {
  e.preventDefault();
  if(!rankDragSrc) return;
  const list = document.getElementById(listId);
  const items = [...list.querySelectorAll('.rank-item:not(.dragging)')];
  const after = items.find(item => {
    const rect = item.getBoundingClientRect();
    return e.clientY < rect.top + rect.height / 2;
  });
  list.insertBefore(rankDragSrc, after || null);
  renumberRank(listId);
}
function rankDrop(e, listId) {
  e.preventDefault();
  if(rankDragSrc) { rankDragSrc.classList.remove('dragging'); rankDragSrc = null; }
  renumberRank(listId);
}
function renumberRank(listId) {
  document.querySelectorAll(`#${listId} .rank-num`).forEach((n,i) => n.textContent = i+1);
}
document.addEventListener('dragend', () => {
  if(rankDragSrc) { rankDragSrc.classList.remove('dragging'); rankDragSrc = null; }
});
</script>
