<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート一覧 — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#5b52e8;--accent-light:#ede9ff;
  --success:#22a06b;--warn:#e0851a;--danger:#e24b4a;
  --bg:#f4f3f8;--surface:#fff;--surface2:#f8f7fc;
  --border:rgba(0,0,0,.08);--text:#1a1825;--text2:#6b677e;--text3:#aba8bb;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(91,82,232,.08);
  --font:'DM Sans','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.app{display:flex;height:100vh;}

/* SIDEBAR (same pattern) */
.sidebar{width:220px;background:#1a1825;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(91,82,232,.35) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{font-size:15px;font-weight:500;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;margin-left:34px;}
.sb-nav{padding:10px 0;flex:1;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin:1px 6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:rgba(91,82,232,.25);color:#fff;border-left:2px solid #7c75ef;}
.sb-item svg{width:13px;height:13px;opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-sec{padding:10px 10px 4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06);}
.sb-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.sb-user .name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;}
.sb-user .role{font-size:9px;color:rgba(255,255,255,.3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:500;flex:1;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-accent:hover{background:#4a42d4;}
.btn svg{width:13px;height:13px;}

/* BODY */
.body{flex:1;overflow-y:auto;padding:24px;}
.body::-webkit-scrollbar{width:5px;}
.body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-num{font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;}

/* FILTER */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.search{flex:1;max-width:280px;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;}
.search:focus{border-color:var(--accent);}
.tab-row{display:flex;gap:2px;}
.tab{padding:6px 12px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--text2);border:1px solid transparent;}
.tab:hover{background:var(--surface2);}
.tab.active{background:var(--accent-light);color:var(--accent);border-color:rgba(91,82,232,.2);font-weight:500;}

/* LIST ROW */
.survey-list { display:flex; flex-direction:column; gap:0; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
.list-header { display:grid; grid-template-columns:3fr 90px 80px 80px 80px 1fr 120px; align-items:center; padding:9px 16px; background:var(--surface2); border-bottom:1px solid var(--border); }
.list-header span { font-size:11px; font-weight:500; color:var(--text3); letter-spacing:.03em; }
.list-row { display:grid; grid-template-columns:3fr 90px 80px 80px 80px 1fr 120px; align-items:center; padding:13px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; }
.list-row:last-child { border-bottom:none; }
.list-row:hover { background:var(--surface2); }
.list-row:hover .row-title { color:var(--accent); }
.list-add-row { display:flex; align-items:center; gap:8px; padding:11px 16px; color:var(--text3); font-size:13px; cursor:pointer; transition:background .12s; }
.list-add-row:hover { background:var(--accent-light); color:var(--accent); }
.list-add-row svg { width:14px; height:14px; }

.row-title-wrap { display:flex; align-items:center; gap:10px; min-width:0; }
.row-color-bar { width:3px; height:32px; border-radius:2px; flex-shrink:0; }
.row-title { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-desc { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.row-cell { font-size:12px; color:var(--text2); }
.row-actions { display:flex; gap:4px; justify-content:flex-end; }
.icon-btn { width:26px; height:26px; border-radius:5px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; }
.icon-btn:hover { background:var(--accent-light); border-color:var(--accent); }
.icon-btn svg { width:12px; height:12px; color:var(--text2); }
.icon-btn:hover svg { color:var(--accent); }
.status-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:500; padding:3px 8px; border-radius:20px; }
.status-active { background:#e4f9f1; color:#1a8c5e; }
.status-draft { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }
.status-closed { background:#fce8e8; color:#b03030; }
.status-dot2 { width:5px; height:5px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-row">
        <div class="logo-icon"><svg viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h7M2 11h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span class="logo-text">Survey Builder</span>
      </div>
      <div class="logo-sub">アンケートビルダー</div>
    </div>
        <div class="sb-nav">
      <div class="sb-sec">メニュー</div>
      <div class="sb-item active" onclick="location.href='list.html'">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        アンケート一覧
      </div>
      <div class="sb-item" onclick="location.href='responses.html'">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V6l4-3 4 3v6H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 12V8h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        回答データ
      </div>
      <div class="sb-item" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.21 2.686-4 6-4s6 1.79 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        回答者一覧
      </div>
      <div class="sb-sec" style="margin-top:6px;">アンケート</div>
      <div id="sb-survey-list"></div>
      <div class="sb-item" onclick="location.href='index.html?new=1'" style="margin-top:4px;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">田</div>
        <div><div class="name">田中 管理者</div><div class="role">Admin</div></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">アンケート一覧</div>
      <button class="btn btn-accent" onclick="location.href='index.html?new=1'">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 4.5v5M4.5 7h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </button>
    </div>

    <div class="body">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num">5</div><div class="stat-label">総アンケート数</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--success);">3</div><div class="stat-label">公開中</div></div>
        <div class="stat-card"><div class="stat-num">147</div><div class="stat-label">総回答数（累計）</div></div>
      </div>

      <div class="filter-row">
        <input class="search" placeholder="🔍  アンケートを検索..." />
        <div class="tab-row">
          <div class="tab active">すべて</div>
          <div class="tab">公開中</div>
          <div class="tab">下書き</div>
          <div class="tab">終了</div>
        </div>
      </div>

      <div class="survey-list" id="surveyList">
        <div class="list-header">
          <span>アンケート名</span>
          <span>ステータス</span>
          <span>設問数</span>
          <span>回答数</span>
          <span>完了率</span>
          <span>最終更新</span>
          <span style="text-align:right;">操作</span>
        </div>
        <div id="surveyRows" style="display:contents;"></div>

        <!-- 追加行 -->
        <div class="list-add-row" onclick="location.href='index.html?new=1'">
          <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 4.5v5M4.5 7h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          新しいアンケートを作成...
        </div>
      </div>
    </div>
  </div>
</div>

<div id="shareModal" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(26,24,37,.5);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;width:400px;max-width:94vw;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.18);">
    <div style="font-size:15px;font-weight:500;color:#1a1825;margin-bottom:16px;">回答ページを共有</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input id="shareUrl" value="answer.html" readonly style="flex:1;padding:9px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.08);font-size:13px;background:#f8f7fc;color:#1a1825;outline:none;" />
      <button onclick="copyShare()" id="copyShareBtn" style="padding:9px 14px;border-radius:8px;background:#5b52e8;color:#fff;border:none;font-size:13px;cursor:pointer;font-weight:500;">コピー</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:space-between;align-items:center;">
      <a href="answer.html" target="_blank" style="font-size:12px;color:#5b52e8;">回答ページを開く ↗</a>
      <button onclick="document.getElementById('shareModal').style.display='none'" style="padding:7px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:#fff;font-size:13px;cursor:pointer;">閉じる</button>
    </div>
  </div>
</div>
<script>
// ── Supabase ──
const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
const sb = (path, opts={}) => fetch(`${SB_URL}/rest/v1/${path}`, {
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation', ...opts.headers },
  ...opts
}).then(r => r.json());

const STATUS_COLORS = { active:'#22a06b', draft:'#aba8bb', closed:'#e24b4a' };
const STATUS_LABELS = { active:'公開中', draft:'下書き', closed:'終了' };
const STATUS_CLASSES = { active:'status-active', draft:'status-draft', closed:'status-closed' };
const BAR_COLORS = ['#5b52e8','#0f6e56','#993556','#185fa5','#854f0b','#e0851a'];

async function loadSurveys(filter='all') {
  const rows = document.getElementById('surveyRows');
  rows.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3);">読み込み中...</div>';
  try {
    let url = 'surveys?select=id,title,description,status,header_color,created_at,updated_at&order=created_at.desc';
    if(filter === 'active') url += '&status=eq.active';
    if(filter === 'draft')  url += '&status=eq.draft';
    if(filter === 'closed') url += '&status=eq.closed';
    const surveys = await sb(url);

    // 各アンケートの回答数・設問数を取得
    const stats = await Promise.all(surveys.map(async s => {
      const qRes = await sb(`questions?survey_id=eq.${s.id}&select=id`, { headers: { 'Accept': 'application/json', Prefer: 'count=exact' } });
      const rRes = await sb(`responses?survey_id=eq.${s.id}&completed=eq.true&select=id`, { headers: { 'Accept': 'application/json', Prefer: 'count=exact' } });
      return { qCount: Array.isArray(qRes) ? qRes.length : 0, rCount: Array.isArray(rRes) ? rRes.length : 0 };
    }));

    // KPI更新
    const total = surveys.length;
    const active = surveys.filter(s=>s.status==='active').length;
    const totalResp = stats.reduce((a,s)=>a+s.rCount,0);
    document.querySelectorAll('.stat-num')[0].textContent = total;
    document.querySelectorAll('.stat-num')[1].textContent = active;
    document.querySelectorAll('.stat-num')[2].textContent = totalResp;

    if(!surveys.length) {
      rows.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--text3);">アンケートがまだありません</div>';
      return;
    }

    rows.innerHTML = surveys.map((s, i) => {
      const color = s.header_color || BAR_COLORS[i % BAR_COLORS.length];
      const sc = STATUS_CLASSES[s.status] || 'status-draft';
      const sl = STATUS_LABELS[s.status] || '不明';
      const dot = `<span class="status-dot2" style="background:${STATUS_COLORS[s.status]||'#aba8bb'};border-radius:50%;"></span>`;
      const updated = new Date(s.updated_at).toLocaleDateString('ja-JP');
      return `<div class="list-row" onclick="location.href='index.html?id=${s.id}'">
        <div class="row-title-wrap">
          <div class="row-color-bar" style="background:${color};"></div>
          <div style="min-width:0;">
            <div class="row-title">${s.title}</div>
            <div class="row-desc">${s.description||''}</div>
          </div>
        </div>
        <div class="row-cell"><span class="status-badge ${sc}">${dot}${sl}</span></div>
        <div class="row-cell">${stats[i].qCount}問</div>
        <div class="row-cell" style="color:var(--accent);font-weight:500;">${stats[i].rCount}件</div>
        <div class="row-cell">—</div>
        <div class="row-cell" style="color:var(--text3);font-size:11px;">${updated}</div>
        <div class="row-actions">
          <div class="icon-btn" title="編集" onclick="event.stopPropagation();location.href='index.html?id=${s.id}'"><svg viewBox="0 0 12 12" fill="none"><path d="M2 9.5l1.5-1.5 5-5 1.5 1.5-5 5L2 9.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg></div>
          <div class="icon-btn" title="集計" onclick="event.stopPropagation();location.href='dashboard.html?id=${s.id}'"><svg viewBox="0 0 12 12" fill="none"><path d="M2 9V5l2-2 2 2 2-3 2 3v4H2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg></div>
          <div class="icon-btn" title="共有" onclick="event.stopPropagation();showShareModal('${s.id}')"><svg viewBox="0 0 12 12" fill="none"><circle cx="9" cy="3" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="3" cy="6" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="9" cy="9" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 5.3l3-1.6M4.5 6.7l3 1.6" stroke="currentColor" stroke-width="1.2"/></svg></div>
          <div class="icon-btn" title="削除" onclick="event.stopPropagation();deleteSurvey('${s.id}',this)" style="color:var(--danger);"><svg viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    rows.innerHTML = `<div style="padding:20px;text-align:center;font-size:13px;color:var(--danger);">読み込みエラー: ${e.message}</div>`;
  }
}

async function deleteSurvey(id, btn) {
  if(!confirm('このアンケートを削除しますか？回答データも削除されます。')) return;
  await sb(`surveys?id=eq.${id}`, { method:'DELETE' });
  showToast('削除しました');
  loadSurveys();
}

// タブ絞り込み
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const map = {'すべて':'all','公開中':'active','下書き':'draft','終了':'closed'};
    loadSurveys(map[tab.textContent] || 'all');
  });
});

// 検索
document.querySelector('.search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('#surveyRows .list-row').forEach(row => {
    row.style.display = row.querySelector('.row-title').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1825;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

loadSurveys();

function showShareModal(surveyId) {
  const base = location.origin + location.pathname.replace('list.html','');
  document.getElementById('shareUrl').value = `${base}answer.html?survey=${surveyId}`;
  document.getElementById('shareModal').style.display='flex';
}
document.getElementById('shareModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
function copyShare(){
  navigator.clipboard.writeText(document.getElementById('shareUrl').value).catch(()=>{});
  const b=document.getElementById('copyShareBtn');
  b.textContent='✓ コピー済み';
  setTimeout(()=>b.textContent='コピー',1800);
}
</script>

<script>
// サイドバーのアンケート一覧をDBから生成
(async function() {
  const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
  const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/surveys?select=id,title,responses(id)&order=created_at.desc&limit=10`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    const surveys = await res.json();
    const container = document.getElementById('sb-survey-list');
    if(!container || !Array.isArray(surveys)) return;
    container.innerHTML = surveys.map(s => {
      const count = Array.isArray(s.responses) ? s.responses.length : 0;
      const badge = count > 0 ? `<span style="margin-left:auto;font-size:9px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.8);padding:1px 6px;border-radius:8px;flex-shrink:0;">${count}</span>` : '';
      return `<div class="sb-item" onclick="location.href='index.html?id=${s.id}'" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${s.title}">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;width:13px;height:13px;"><path d="M3 3h10v10H3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6 6h4M6 9h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span style="overflow:hidden;text-overflow:ellipsis;flex:1;">${s.title}</span>
        ${badge}
      </div>`;
    }).join('');
  } catch(e) { console.error('sidebar error:', e); }
})();
</script>
