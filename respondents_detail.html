<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答者詳細 — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#5b52e8;--accent-light:#ede9ff;--success:#22a06b;--warn:#e0851a;--danger:#e24b4a;--bg:#f4f3f8;--surface:#fff;--surface2:#f8f7fc;--border:rgba(0,0,0,.08);--text:#1a1825;--text2:#6b677e;--text3:#aba8bb;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(91,82,232,.08);--font:'DM Sans','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.app{display:flex;height:100vh;}
.sidebar{width:220px;background:#1a1825;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(91,82,232,.35) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{font-size:15px;font-weight:500;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;margin-left:34px;}
.sb-nav{padding:10px 0;flex:1;}
.sb-sec{padding:10px 10px 4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin:1px 6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:rgba(91,82,232,.25);color:#fff;border-left:2px solid #7c75ef;}
.sb-item svg{width:13px;height:13px;opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;}
.sb-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.sb-user .name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;}
.sb-user .role{font-size:9px;color:rgba(255,255,255,.3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-back{color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 7px;border-radius:5px;}
.topbar-back:hover{background:var(--surface2);}
.topbar-title{font-size:14px;font-weight:500;flex:1;}
.topbar-sub{font-size:11px;color:var(--text3);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn svg{width:12px;height:12px;}
.body{flex:1;overflow-y:auto;padding:20px;}
.body::-webkit-scrollbar{width:5px;}
.body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.kpi-num{font-size:24px;font-weight:700;color:var(--text);}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.table-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:13px;font-weight:500;}
.search{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;width:200px;}
.search:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;color:var(--text3);text-align:left;padding:9px 16px;border-bottom:1px solid var(--border);font-weight:500;background:var(--surface2);}
td{font-size:12px;color:var(--text2);padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover td{background:var(--surface2);cursor:pointer;}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.icon-btn svg{width:12px;height:12px;color:var(--text2);}
.icon-btn:hover svg{color:var(--accent);}

/* 詳細モーダル */
.modal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(26,24,37,.5);align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:12px;width:480px;max-width:96vw;box-shadow:0 16px 48px rgba(0,0,0,.18);overflow:hidden;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:14px;font-weight:500;}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1;}
.modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}
.ans-block{background:var(--surface2);border-radius:8px;padding:12px;}
.ans-label{font-size:10px;color:var(--text3);margin-bottom:4px;}
.ans-value{font-size:13px;color:var(--text);line-height:1.5;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-row">
        <div class="logo-icon"><svg viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h7M2 11h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span class="logo-text">Survey Builder</span>
      </div>
      <div class="logo-sub">アンケートビルダー</div>
    </div>
    <div class="sb-nav">
      <div class="sb-sec">メニュー</div>
      <div class="sb-item" onclick="location.href='list.html'">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        アンケート一覧
      </div>
      <div class="sb-item" onclick="location.href='responses.html'">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V6l4-3 4 3v6H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 12V8h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        回答データ
      </div>
      <div class="sb-item active" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.21 2.686-4 6-4s6 1.79 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        回答者一覧
      </div>
      <div class="sb-sec" style="margin-top:6px;">アンケート</div>
      <div id="sb-survey-list"></div>
      <div class="sb-item" onclick="location.href='index.html?new=1'" style="margin-top:4px;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">青</div>
        <div><div class="name">青木 管理者</div><div class="role">Admin</div></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-back" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px;"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        回答者一覧
      </div>
      <div style="width:1px;height:18px;background:var(--border);"></div>
      <div style="flex:1;">
        <div class="topbar-title" id="topbar-title">読み込み中...</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <button class="btn" onclick="location.href='dashboard.html?id='+SURVEY_ID">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 9V5l2-2 2 2 2-3 2 3v4H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        集計を見る
      </button>
      <button class="btn" onclick="exportCSV()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ローデータ出力
      </button>
      <button class="btn" onclick="exportCsvFile()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ラベルデータ出力
      </button>
    </div>

    <div class="body">
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">回答者数</div><div class="kpi-num" id="kpi-total">—</div></div>
        <div class="kpi-card"><div class="kpi-label">今週の新着</div><div class="kpi-num" id="kpi-week" style="color:var(--success);">—</div></div>
        <div class="kpi-card"><div class="kpi-label">完了率</div><div class="kpi-num" id="kpi-rate">—</div></div>
      </div>

      <div class="card">
        <div class="table-header">
          <div class="table-title" id="table-title">回答者一覧</div>
          <input class="search" placeholder="🔍  回答者を検索..." oninput="filterTable(this.value)" />
        </div>
        <table>
          <thead>
            <tr>
              <th>回答者</th>
              <th>第1回答</th>
              <th>第2回答</th>
              <th>回答日時</th>
              <th style="text-align:right;">操作</th>
            </tr>
          </thead>
          <tbody id="respTable">
            <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text3);">読み込み中...</td></tr>
          </tbody>

      </div>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal" id="detailModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">回答詳細</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
const get = path => fetch(`${SB_URL}/rest/v1/${path}`, {
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
}).then(r => r.json());

const SURVEY_ID = new URLSearchParams(location.search).get('id');
const COLORS = ['#5b52e8','#0f6e56','#993556','#185fa5','#854f0b','#e0851a'];

let allResponses = [];
let allAnswers   = [];
let questions    = [];

async function loadPage() {
  if(!SURVEY_ID) {
    document.getElementById('topbar-title').textContent = 'アンケートが指定されていません';
    return;
  }
  try {
    // アンケート情報
    const [survey] = await get(`surveys?id=eq.${SURVEY_ID}&select=title,status`);
    document.getElementById('topbar-title').textContent = survey?.title || '—';
    document.getElementById('topbar-sub').textContent   = survey?.status === 'active' ? '公開中' : '下書き';
    document.title = `${survey?.title} — 回答者一覧`;

    // 設問一覧
    questions = await get(`questions?survey_id=eq.${SURVEY_ID}&select=id,title,type,position,required,options(*)&order=position`);

    // 回答セッション
    allResponses = await get(`responses?survey_id=eq.${SURVEY_ID}&completed=eq.true&select=*&order=finished_at.asc`);
    const total  = allResponses.length;
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
    const week   = allResponses.filter(r => new Date(r.finished_at) > weekAgo).length;

    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-week').textContent  = week;
    document.getElementById('kpi-rate').textContent  = total > 0 ? '100%' : '—';
    document.getElementById('table-title').textContent = `回答者一覧（${total}件）`;

    if(total === 0) {
      document.getElementById('respTable').innerHTML =
        '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text3);">回答がまだありません</td></tr>';
      return;
    }

    // 回答データ
    const ids = allResponses.map(r=>r.id).join(',');
    allAnswers = await get(`answers?response_id=in.(${ids})&select=*`);

    renderTable(allResponses);
  } catch(e) {
    console.error(e);
    document.getElementById('respTable').innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--danger);">読み込みエラー</td></tr>';
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('respTable');
  tbody.innerHTML = rows.map((r, i) => {
    const rAns = allAnswers.filter(a => a.response_id === r.id);
    const a1 = rAns[0]?.value || '—';
    const a2 = rAns[1]?.value || '—';
    const date = new Date(r.finished_at).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const name = r.respondent_name || `回答者 ${i+1}`;
    const col  = COLORS[i % COLORS.length];
    return `<tr class="clickable" onclick="openDetail('${r.id}','${name.replace(/'/g,"\\'")}')">
      <td><div style="display:flex;align-items:center;gap:9px;">
        <div class="avatar-sm" style="background:${col};">${name.charAt(0)}</div>${name}
      </div></td>
      <td>${a1}</td>
      <td>${a2}</td>
      <td style="color:var(--text3);font-size:11px;">${date}</td>
      <td style="text-align:right;">
        <div class="icon-btn" onclick="event.stopPropagation();openDetail('${r.id}','${name.replace(/'/g,"\\'")}')">
          <svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 5v3M6 4.5v-.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable(q) {
  const filtered = allResponses.filter((r,i) => {
    const name = r.respondent_name || `回答者 ${i+1}`;
    return name.toLowerCase().includes(q.toLowerCase());
  });
  renderTable(filtered);
}

function openDetail(responseId, name) {
  const rAns = allAnswers.filter(a => a.response_id === responseId);
  document.getElementById('modal-title').textContent = `${name} の回答`;
  document.getElementById('modal-body').innerHTML = questions.length
    ? questions.map((q, i) => {
        const ans = rAns[i];
        const val = ans?.values?.length ? ans.values.join('、') : (ans?.value || '（未回答）');
        return `<div class="ans-block">
          <div class="ans-label">Q${i+1} ${q.title}</div>
          <div class="ans-value">${val}</div>
        </div>`;
      }).join('')
    : rAns.map((a,i) => `<div class="ans-block">
        <div class="ans-label">設問 ${i+1}</div>
        <div class="ans-value">${a.values?.join('、') || a.value || '（未回答）'}</div>
      </div>`).join('') || '<div style="color:var(--text3);text-align:center;padding:16px;">回答データがありません</div>';
  document.getElementById('detailModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
}
document.getElementById('detailModal').addEventListener('click', e => {
  if(e.target === document.getElementById('detailModal')) closeModal();
});

function exportCSV() {
  const NON_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);
  const TEXT_TYPES = new Set(['text','textarea']);
  const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
  const CRLF = String.fromCharCode(13) + String.fromCharCode(10);
  const BOM  = String.fromCharCode(0xFEFF);
  const TAB  = String.fromCharCode(9);

  // 選択肢ラベル→番号 逆引きマップ生成（上から N, N-1, ..., 1）
  function buildChoiceMap(opts, optType) {
    const sorted = opts.filter(o => o.option_type === optType).sort((a,b) => a.position - b.position);
    const N = sorted.length;
    const map = {};
    sorted.forEach((o, i) => { map[o.label] = N - i; });
    return map;
  }

  // ── ヘッダー生成（設問番号コードのみ）──
  const headers = ['回答者ID', '回答日時'];
  let qNum = 0;
  answerableQs.forEach(function(q) {
    qNum++;
    const mRows = (q.options||[]).filter(function(o){ return o.option_type === 'matrix_row'; }).sort(function(a,b){ return a.position - b.position; });
    if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
      mRows.forEach(function(row, ri) { headers.push('Q' + qNum + 'S' + (ri+1)); });
    } else if (TEXT_TYPES.has(q.type)) {
      headers.push('Q' + qNum + 'S1FA');
    } else {
      headers.push('Q' + qNum);
    }
  });

  // ── データ行生成 ──
  const dataRows = allResponses.map(function(resp, ri) {
    const rAns = allAnswers.filter(function(a) { return a.response_id === resp.id; });
    const ansMap = {};
    rAns.forEach(function(a) { ansMap[a.question_id] = a; });
    const row = [ri + 1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];

    answerableQs.forEach(function(q) {
      const ans = ansMap[q.id];
      const val = ans ? (ans.value || '') : '';
      const mRows = (q.options||[]).filter(function(o){ return o.option_type === 'matrix_row'; }).sort(function(a,b){ return a.position - b.position; });

      if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
        var colMap = buildChoiceMap(q.options||[], 'matrix_col');
        var parsed = {};
        try { parsed = JSON.parse(val); } catch(e) {}
        mRows.forEach(function(mrow, ri2) {
          var cellAns = parsed[ri2] || parsed[String(ri2)] || parsed[mrow.label] || '';
          var cellArr = Array.isArray(cellAns) ? cellAns : (cellAns ? [cellAns] : []);
          if (!cellArr.length) { row.push(0); return; }
          row.push(cellArr.map(function(label){ return colMap[label] || 0; }).join('/'));
        });
      } else if (TEXT_TYPES.has(q.type)) {
        row.push(val);
      } else {
        var choiceMap = buildChoiceMap(q.options||[], 'option');
        if (!val) { row.push(0); return; }
        var labels = [];
        try {
          var p = JSON.parse(val);
          labels = Array.isArray(p) ? p : [String(p)];
        } catch(e) {
          labels = val.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
        }
        if (!labels.length) { row.push(0); return; }
        if (labels.length === 1) {
          row.push(choiceMap[labels[0]] || 0);
        } else {
          row.push(labels.map(function(l){ return choiceMap[l] || 0; }).join('/'));
        }
      }
    });
    return row;
  });

  // ── CSV生成・ダウンロード ──
  var sanitize = function(v) {
    var s = String(v).split(TAB).join(' ').split(String.fromCharCode(13)).join(' ').split(String.fromCharCode(10)).join(' ');
    s = s.replace(/"/g, '""');
    if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1) s = '"' + s + '"';
    return s;
  };
  var lines = [headers].concat(dataRows).map(function(r){ return r.map(sanitize).join(','); });
  var surveyTitle = document.getElementById('topbar-title').textContent || 'アンケート';
  var blob = new Blob([BOM + lines.join(CRLF)], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = surveyTitle + '_ローデータ_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}



function exportCsvFile() {
  const NON_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);
  const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
  const SP = String.fromCharCode(0x3000);
  const TAB = String.fromCharCode(9); // sanitize用（出力はカンマ）
  const CRLF = String.fromCharCode(13) + String.fromCharCode(10);
  const BOM = String.fromCharCode(0xFEFF);

  const headers = ['回答者ID', '回答日時'];
  let qNum = 0;
  answerableQs.forEach(function(q) {
    qNum++;
    const mRows = (q.options||[]).filter(function(o){return o.option_type==='matrix_row';}).sort(function(a,b){return a.position-b.position;});
    const reqMark = q.required ? ' ※必須' : '';
    const title = q.title || '';
    if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
      mRows.forEach(function(row,ri){ headers.push('Q'+qNum+'S'+(ri+1)+SP+title+reqMark+' '+(ri+1)+'．'+row.label); });
    } else if (q.type==='text'||q.type==='textarea') {
      headers.push('Q'+qNum+'S1FA'+SP+title+' ご回答');
    } else {
      headers.push('Q'+qNum+SP+title);
    }
  });

  const dataRows = allResponses.map(function(resp,ri) {
    const rAns = allAnswers.filter(function(a){return a.response_id===resp.id;});
    const ansMap = {};
    rAns.forEach(function(a){ansMap[a.question_id]=a;});
    const row = [ri+1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];
    answerableQs.forEach(function(q) {
      const ans = ansMap[q.id];
      const val = ans ? (ans.value||'') : '';
      const mRows = (q.options||[]).filter(function(o){return o.option_type==='matrix_row';}).sort(function(a,b){return a.position-b.position;});
      if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
        var parsed={}; try{parsed=JSON.parse(val);}catch(e){}
        mRows.forEach(function(mrow,ri2){
          var cellAns=parsed[ri2]||parsed[String(ri2)]||parsed[mrow.label]||'';
          var cellArr=Array.isArray(cellAns)?cellAns:(cellAns?[cellAns]:[]);
          row.push(cellArr.join('/'));
        });
      } else { row.push(val); }
    });
    return row;
  });

  const sanitize = function(v) {
    var s = String(v).split(TAB).join(' ').split(String.fromCharCode(13)).join(' ').split(String.fromCharCode(10)).join(' ');
    s = s.replace(/"/g, '""');
    if(s.indexOf(',') !== -1 || s.indexOf('"') !== -1) s = '"' + s + '"';
    return s;
  };
  const lines = [headers].concat(dataRows).map(function(r){ return r.map(sanitize).join(','); });
  const surveyTitle = document.getElementById('topbar-title').textContent || 'アンケート';
  const blob = new Blob([BOM+lines.join(CRLF)], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=surveyTitle+'_回答データ_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

(async function() {

        <span style="overflow:hidden;text-overflow:ellipsis;flex:1;">${s.title}</span>

    }).join('');
  } catch(e) { console.error('sidebar error:', e); }
})();
