<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答集計 — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#5b52e8; --accent-light:#ede9ff;
  --success:#22a06b; --warn:#e0851a; --danger:#e24b4a;
  --bg:#f4f3f8; --surface:#fff; --surface2:#f8f7fc;
  --border:rgba(0,0,0,0.08); --text:#1a1825; --text2:#6b677e; --text3:#aba8bb;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(91,82,232,0.08);
  --font:'DM Sans','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;background:#1a1825;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(91,82,232,.35) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{font-size:15px;font-weight:500;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;margin-left:34px;}
.sb-nav{padding:10px 0;flex:1;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin:1px 6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:rgba(91,82,232,.25);color:#fff;border-left:2px solid #7c75ef;}
.sb-item svg{width:13px;height:13px;opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-badge{margin-left:auto;font-size:10px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;}
.sb-sec{padding:10px 10px 4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06);}
.sb-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.sb-user .name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;}
.sb-user .role{font-size:9px;color:rgba(255,255,255,.3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-back{color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 7px;border-radius:5px;}
.topbar-back:hover{background:var(--surface2);}
.topbar-title{font-size:14px;font-weight:500;flex:1;}
.topbar-sub{font-size:11px;color:var(--text3);}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:4px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-accent:hover{background:#4a42d4;}
.btn svg{width:12px;height:12px;}

/* BODY */
.body{flex:1;overflow-y:auto;padding:20px;}
.body::-webkit-scrollbar{width:5px;}
.body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.kpi-label svg{width:12px;height:12px;}
.kpi-num{font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.kpi-change{font-size:11px;margin-top:5px;}
.kpi-change.up{color:var(--success);}
.kpi-change.down{color:var(--danger);}

/* GRID 2COL */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px;}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.card-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.card-title span{font-size:10px;color:var(--text3);font-weight:400;}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--text2);min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.bar-pct{font-size:11px;color:var(--text3);min-width:34px;text-align:right;}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:14px;}
.donut-legend{display:flex;flex-direction:column;gap:6px;flex:1;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* TIMELINE */
.timeline-svg-wrap { width:100%; overflow:hidden; }

/* RESPONSE TABLE */
.resp-table{width:100%;border-collapse:collapse;}
.resp-table th{font-size:11px;color:var(--text3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:500;}
.resp-table td{font-size:12px;color:var(--text2);padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.resp-table tr:last-child td{border-bottom:none;}
.resp-table tr:hover td{background:var(--surface2);}
.avatar-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-green{background:#e4f9f1;color:#1a8c5e;}
.badge-yellow{background:#fef3e8;color:#c17120;}
.badge-gray{background:var(--surface2);color:var(--text3);}

/* SCORE DISPLAY */
.score-big{font-size:42px;font-weight:700;color:var(--accent);line-height:1;}
.score-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.score-row{display:flex;align-items:baseline;gap:8px;}
.score-prev{font-size:13px;color:var(--text3);}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.filter-tag{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;}
.filter-tag:hover,.filter-tag.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.search-box{flex:1;min-width:160px;max-width:220px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;}
.search-box:focus{border-color:var(--accent);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-row">
        <div class="logo-icon"><svg viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h7M2 11h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span class="logo-text">Survey Builder</span>
      </div>
      <div class="logo-sub">アンケートビルダー</div>
    </div>
        <div class="sb-nav">
      <div class="sb-sec">メニュー</div>
      <div class="sb-item" onclick="location.href='list.html'">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        アンケート一覧
      </div>
      <div class="sb-item active" onclick="location.href='responses.html'">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V6l4-3 4 3v6H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 12V8h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        回答データ
      </div>
      <div class="sb-item" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.21 2.686-4 6-4s6 1.79 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>

      </div>
      <div class="sb-sec" style="margin-top:6px;">アンケート</div>
      <div id="sb-survey-list"></div>
      <div class="sb-item" onclick="location.href='index.html?new=1'" style="margin-top:4px;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">青</div>
        <div><div class="name">青木 管理者</div><div class="role">Admin</div></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-back" onclick="location.href='responses.html'" style="cursor:pointer;">
        <svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px;"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>一覧
      </div>
      <div style="width:1px;height:18px;background:var(--border);"></div>
      <div style="flex:1;">
        <div class="topbar-title">顧客満足度調査 2025 — 回答集計</div>
        <div class="topbar-sub"><span class="status-dot"></span>公開中 · 最終更新 5分前</div>
      </div>
      <button class="btn" onclick="downloadExcel()"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>ローデータ出力</button>
      <button class="btn" onclick="downloadCsv()"><svg viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>ラベルデータ出力</button>
      <button class="btn" id="btn-respondents" onclick="goRespondents()"><svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="6" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 12c0-2 2-3.5 5-3.5s5 1.5 5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>回答者一覧</button>
      <button class="btn btn-accent" onclick="downloadPDF()"><svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M7 4v4l2.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>レポート</button>
    </div>

    <div class="body">
      <!-- FILTER BAR -->
      <div class="filter-bar">
        <input class="search-box" placeholder="🔍  回答者を検索..." />
      </div>

      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label"><svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/></svg>総回答数</div>
          <div class="kpi-num" id="kpi-total">—</div>
          <div class="kpi-change" id="kpi-total-change"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><svg viewBox="0 0 12 12" fill="none"><path d="M2 10V4l4-3 4 3v6" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>完了率</div>
          <div class="kpi-num" id="kpi-rate">—</div>
          <div class="kpi-change" id="kpi-rate-change"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5v3l1.5 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>平均回答時間</div>
          <div class="kpi-num" id="kpi-time">—</div>
          <div class="kpi-change" id="kpi-time-change"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><svg viewBox="0 0 12 12" fill="none"><path d="M6 2l1 3h3l-2.5 2 1 3L6 8.5 3.5 10l1-3L2 5h3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>NPS スコア</div>
          <div class="kpi-num" id="kpi-nps" style="color:var(--success);">—</div>

      <!-- ROW 1 -->
      <div class="grid2">
        <!-- 満足度分布 -->
        <div class="card">
          <div class="card-title" id="satisfaction-title">回答集計 <span id="satisfaction-n"></span></div>
<div id="satisfaction-bars"><div style="padding:20px;text-align:center;font-size:13px;color:var(--text3);">読み込み中...</div></div>
        </div>

        <!-- サービス内訳 -->
        <div class="card">
          <div class="card-title" id="donut-title">選択肢集計 <span id="donut-n"></span></div>
          <div class="donut-wrap" id="donut-wrap">
            <div style="padding:16px;text-align:center;font-size:13px;color:var(--text3);">読み込み中...</div>
          </div>
        </div>
      </div>

      <!-- ROW 2 -->
      <div class="grid3">
        <!-- 推移グラフ -->
        <div class="card">
          <div class="card-title">回答数推移（直近14日）<span>日次</span></div>
          <div class="timeline-svg-wrap">
            <svg id="timelineChart" width="100%" height="auto" viewBox="0 0 420 190" preserveAspectRatio="xMidYMid meet" style="display:block;overflow:visible;"></svg>
          </div>
        </div>

        <!-- NPS -->
        <div class="card" style="display:flex;flex-direction:column;justify-content:space-between;">
          <div class="card-title">NPS スコア</div>
          <div id="nps-content" style="text-align:center;padding:16px 0;">
            <div class="score-big" id="nps-score">—</div>
            <div class="score-sub" id="nps-sub">データがありません</div>

      <!-- RESPONSE LIST -->

              </tr>

</div>

<script>
// 回答推移グラフはloadDashboard内でDB連携描画
const FONT = "'DM Sans','Noto Sans JP',sans-serif";
// 回答者テーブル
// ── ローデータ出力 ──
function downloadExcel() {
  const questions  = window._dashQuestions  || [];
  const responses  = window._dashResponses  || [];
  const answers    = window._dashAnswers    || [];
  const surveyTitle = window._dashSurveyTitle || 'アンケート';

  if(!questions.length || !responses.length) {
    showToast('データがまだ読み込まれていません');
    return;
  }

  const NON_TYPES  = new Set(['cover','description','image','video','url','page_break','branch']);
  const TEXT_TYPES = new Set(['text','textarea']);
  const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
  const CRLF = String.fromCharCode(13) + String.fromCharCode(10);
  const BOM  = String.fromCharCode(0xFEFF);
  const TAB  = String.fromCharCode(9);

  // 選択肢ラベル→番号 逆引きマップ生成（上から 1, 2, 3, ...）
  function buildChoiceMap(opts, optType) {
    const sorted = opts.filter(o => o.option_type === optType).sort((a,b) => a.position - b.position);
    const map = {};
    sorted.forEach((o, i) => { map[o.label] = i + 1; });
    return map;
  }

  // ── ヘッダー生成（設問番号コードのみ）──
  const headers = ['回答者ID', '回答日時'];
  let qNum = 0;
  answerableQs.forEach(function(q) {
    qNum++;
    const mRows = (q.options||[]).filter(function(o){ return o.option_type === 'matrix_row'; }).sort(function(a,b){ return a.position - b.position; });
    if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
      mRows.forEach(function(row, ri) { headers.push('Q' + qNum + 'S' + (ri+1)); });
    } else if (TEXT_TYPES.has(q.type)) {
      headers.push('Q' + qNum + 'S1FA');
    } else {
      headers.push('Q' + qNum);
    }
  });

  // ── データ行（古い順→新しい順）──
  const sortedResponses = responses.slice().sort(function(a, b) {
    return new Date(a.finished_at) - new Date(b.finished_at);
  });

  const dataRows = sortedResponses.map(function(resp, ri) {
    const rAns = answers.filter(function(a) { return a.response_id === resp.id; });
    const ansMap = {};
    rAns.forEach(function(a) { ansMap[a.question_id] = a; });
    const row = [ri + 1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];

    answerableQs.forEach(function(q) {
      const ans = ansMap[q.id];
      const val = ans ? (ans.value || '') : '';
      const mRows = (q.options||[]).filter(function(o){ return o.option_type === 'matrix_row'; }).sort(function(a,b){ return a.position - b.position; });

      if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
        var colMap = buildChoiceMap(q.options||[], 'matrix_col');
        var parsed = {};
        try { parsed = JSON.parse(val); } catch(e) {}
        mRows.forEach(function(mrow, ri2) {
          var cellAns = parsed[ri2] || parsed[String(ri2)] || parsed[mrow.label] || '';
          var cellArr = Array.isArray(cellAns) ? cellAns : (cellAns ? [cellAns] : []);
          if (!cellArr.length) { row.push(0); return; }
          row.push(cellArr.map(function(label){ return colMap[label] || 0; }).join('/'));
        });
      } else if (TEXT_TYPES.has(q.type)) {
        row.push(val);
      } else {
        var choiceMap = buildChoiceMap(q.options||[], 'choice');
        if (!val) { row.push(0); return; }
        var labels = [];
        try {
          var p = JSON.parse(val);
          labels = Array.isArray(p) ? p : [String(p)];
        } catch(e) {
          labels = val.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
        }
        if (!labels.length) { row.push(0); return; }
        if (labels.length === 1) {
          row.push(choiceMap[labels[0]] || 0);
        } else {
          row.push(labels.map(function(l){ return choiceMap[l] || 0; }).join('/'));
        }
      }
    });
    return row;
  });

  // ── CSV生成・ダウンロード ──
  const sanitize = function(v) {
    var s = String(v).split(TAB).join(' ').split(String.fromCharCode(13)).join(' ').split(String.fromCharCode(10)).join(' ');
    s = s.replace(/"/g, '""');
    if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1) s = '"' + s + '"';
    return s;
  };
  const lines = [headers].concat(dataRows).map(function(r){ return r.map(sanitize).join(','); });
  const blob = new Blob([BOM + lines.join(CRLF)], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = surveyTitle + '_ローデータ_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✓ ローデータをダウンロードしました');
}


// ── CSV出力 ──
function downloadCsv() {
  const questions   = window._dashQuestions  || [];
  const responses   = window._dashResponses  || [];
  const answers     = window._dashAnswers    || [];
  const surveyTitle = window._dashSurveyTitle || 'アンケート';

  if(!questions.length || !responses.length) { showToast('データがまだ読み込まれていません'); return; }

  const NON_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);
  const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
  const SP   = String.fromCharCode(0x3000);
  const TAB  = String.fromCharCode(9); // sanitize用（出力はカンマ）
  const CRLF = String.fromCharCode(13) + String.fromCharCode(10);
  const BOM  = String.fromCharCode(0xFEFF);

  const headers = ['回答者ID', '回答日時'];
  let qNum = 0;
  answerableQs.forEach(function(q) {
    qNum++;
    const mRows = (q.options||[]).filter(function(o){return o.option_type==='matrix_row';}).sort(function(a,b){return a.position-b.position;});
    const reqMark = q.required ? ' ※必須' : '';
    const title = q.title || '';
    if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
      mRows.forEach(function(row,ri){ headers.push('Q'+qNum+'S'+(ri+1)+SP+title+reqMark+' '+(ri+1)+'．'+row.label); });
    } else if (q.type==='text'||q.type==='textarea') {
      headers.push('Q'+qNum+'S1FA'+SP+title+' ご回答');
    } else {
      headers.push('Q'+qNum+SP+title);
    }
  });

  const sortedResponses = responses.slice().sort(function(a,b){ return new Date(a.finished_at)-new Date(b.finished_at); });
  const dataRows = sortedResponses.map(function(resp,ri) {
    const rAns = answers.filter(function(a){return a.response_id===resp.id;});
    const ansMap = {};
    rAns.forEach(function(a){ansMap[a.question_id]=a;});
    const row = [ri+1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];
    answerableQs.forEach(function(q) {
      const ans = ansMap[q.id];
      const val = ans ? (ans.value||'') : '';
      const mRows = (q.options||[]).filter(function(o){return o.option_type==='matrix_row';}).sort(function(a,b){return a.position-b.position;});
      if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
        var parsed={}; try{parsed=JSON.parse(val);}catch(e){}
        mRows.forEach(function(mrow,ri2){
          var cellAns=parsed[ri2]||parsed[String(ri2)]||parsed[mrow.label]||'';
          var cellArr=Array.isArray(cellAns)?cellAns:(cellAns?[cellAns]:[]);
          row.push(cellArr.join('/'));
        });
      } else { row.push(val); }
    });
    return row;
  });

  const sanitize = function(v) {
    var s = String(v).split(TAB).join(' ').split(String.fromCharCode(13)).join(' ').split(String.fromCharCode(10)).join(' ');
    s = s.replace(/"/g, '""');
    if(s.indexOf(',') !== -1 || s.indexOf('"') !== -1) s = '"' + s + '"';
    return s;
  };
  const lines = [headers].concat(dataRows).map(function(r){ return r.map(sanitize).join(','); });
  const blob = new Blob([BOM+lines.join(CRLF)], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=surveyTitle+'_回答データ_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✓ ラベルデータをダウンロードしました');
}

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';

  };
  document.head.appendChild(script);
}

async function loadDashboard() {
  const surveyId = SURVEY_ID_D || new URLSearchParams(location.search).get('id');
  if(!surveyId) return;

  try {
    // ── アンケート情報 ──
    const [survey] = await sbGet(`surveys?id=eq.${surveyId}&select=*`);
    if(survey) {
      document.querySelector('.topbar-title').textContent = `${survey.title} — 回答集計`;
      const shareLink = `${location.origin}${location.pathname.replace('dashboard.html','answer.html')}?survey=${surveyId}`;
      const shareAnchor = document.querySelector('.topbar a[href*="answer.html"]');
      if(shareAnchor) shareAnchor.href = shareLink;
    }

    // ── 回答セッション ──
    const responses = await sbGet(`responses?survey_id=eq.${surveyId}&completed=eq.true&select=*&order=finished_at.desc`);
    const total = responses.length;

    // ── KPI更新 ──
    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-rate').textContent  = total > 0 ? '100%' : '—';
    document.getElementById('kpi-time').textContent  = '—';
    document.getElementById('kpi-nps').textContent   = total > 0 ? '集計中' : '—';

    // ── 回答者テーブル ──
    if(total === 0) {
      document.getElementById('respTableBody').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--text3);">回答がまだありません</td></tr>';
      document.getElementById('satisfaction-bars').innerHTML = '<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3);">回答がまだありません</div>';
      return;
    }

    // ── 回答データ取得 ──
    const responseIds = responses.map(r=>r.id).join(',');
    const answers = await sbGet(`answers?response_id=in.(${responseIds})&select=*`);

    // ── 設問一覧を取得（回答の意味を解釈するため） ──
    const questions = await sbGet(`questions?survey_id=eq.${surveyId}&select=id,title,type,position,required,options(*)&order=position`);
    // グローバルに保存（Excel出力で使用）
    window._dashSurveyTitle = survey?.title || 'アンケート';
    window._dashQuestions   = questions;
    window._dashResponses   = responses;
    window._dashAnswers     = answers;
    dashLoadCols();
    dashUpdateTableHead();

    // ── 設問ごとの回答を集計 ──
    const qStats = {};
    questions.forEach(q => { qStats[q.id] = { title: q.title, type: q.type, values: [] }; });
    answers.forEach(a => {
      if(a.question_id && qStats[a.question_id]) {
        if(a.values && a.values.length) qStats[a.question_id].values.push(...a.values);
        else if(a.value) qStats[a.question_id].values.push(a.value);
      }
    });

    // ── 満足度バーグラフ（最初の選択式設問を使用） ──
    const choiceQ = questions.find(q => ['radio','select','checkbox'].includes(q.type));
    if(choiceQ && qStats[choiceQ.id]?.values.length) {
      const vals = qStats[choiceQ.id].values;
      const counts = {};
      vals.forEach(v => counts[v] = (counts[v]||0) + 1);
      const total_v = vals.length;
      const colors = ['#5b52e8','#7c75ef','#aba8bb','#e24b4a','#c8c5f5'];
      document.getElementById('satisfaction-title').innerHTML = `${choiceQ.title} <span id="satisfaction-n">n=${total}</span>`;
      document.getElementById('satisfaction-bars').innerHTML = Object.entries(counts).map(([label, count], i) => {
        const pct = Math.round(count/total_v*100);
        return `<div class="bar-row">
          <div class="bar-label" style="min-width:80px;font-size:12px;">${label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]};"></div></div>
          <div class="bar-pct">${pct}%</div>
        </div>`;
      }).join('');
    } else {
      document.getElementById('satisfaction-bars').innerHTML = '<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3);">集計データがありません</div>';
    }

    document.getElementById('resp-list-count').textContent = `全${total}件`;

    // ── NPS（スケール設問の回答から計算）──
    const scaleQ = questions.find(q => q.type === 'scale');
    if(scaleQ && qStats[scaleQ.id]?.values.length) {
      const scores = qStats[scaleQ.id].values.map(Number).filter(n => !isNaN(n));
      const promoters  = scores.filter(n => n >= 9).length;
      const detractors = scores.filter(n => n <= 6).length;
      const total_s = scores.length;
      const nps = total_s > 0 ? Math.round((promoters - detractors) / total_s * 100) : 0;
      const promoterPct  = total_s > 0 ? Math.round(promoters / total_s * 100) : 0;
      const detractorPct = total_s > 0 ? Math.round(detractors / total_s * 100) : 0;
      const neutralPct   = 100 - promoterPct - detractorPct;
      document.getElementById('nps-score').textContent = (nps >= 0 ? '+' : '') + nps;
      document.getElementById('nps-sub').textContent = `推奨者 ${promoterPct}% — 中立 ${neutralPct}% — 批判者 ${detractorPct}%`;
      document.getElementById('nps-bars').innerHTML = `
        <div class="bar-row" style="margin-bottom:5px;"><div class="bar-label" style="min-width:52px;font-size:11px;">推奨者</div><div class="bar-track"><div class="bar-fill" style="width:${promoterPct}%;background:#22a06b;"></div></div><div class="bar-pct">${promoterPct}%</div></div>
        <div class="bar-row" style="margin-bottom:5px;"><div class="bar-label" style="min-width:52px;font-size:11px;">中立者</div><div class="bar-track"><div class="bar-fill" style="width:${neutralPct}%;background:#aba8bb;"></div></div><div class="bar-pct">${neutralPct}%</div></div>
        <div class="bar-row"><div class="bar-label" style="min-width:52px;font-size:11px;">批判者</div><div class="bar-track"><div class="bar-fill" style="width:${detractorPct}%;background:#e24b4a;"></div></div><div class="bar-pct">${detractorPct}%</div></div>`;
      document.getElementById('kpi-nps').textContent = (nps >= 0 ? '+' : '') + nps;
    } else {
      document.getElementById('nps-score').textContent = '—';
      document.getElementById('nps-sub').textContent = 'スケール設問の回答がありません';
    }

    // ── 回答推移グラフ（直近14日・DB連携） ──
    const svgEl = document.getElementById('timelineChart');
    if(svgEl) {
      svgEl.innerHTML = '';
      const today = new Date();
      const days = Array.from({length:14}, (_,i) => {
        const d = new Date(today);
        d.setDate(today.getDate() - (13 - i));
        return d;
      });
      const dayCounts = days.map(d => {
        const ds = d.toISOString().slice(0,10);
        return responses.filter(r => r.finished_at?.slice(0,10) === ds).length;
      });
      const svgW2=420, padB2=28, padT2=22, padX2=10, chartH2=140;
      const svgH2 = padT2 + chartH2 + padB2;
      const maxVal2 = Math.max(...dayCounts, 1);
      const n2 = dayCounts.length;
      const slotW2 = (svgW2 - padX2*2) / n2;
      const barW2 = Math.max(slotW2 * 0.55, 6);
      svgEl.setAttribute('viewBox', `0 0 ${svgW2} ${svgH2}`);
      svgEl.setAttribute('height', svgH2);

      dayCounts.forEach((v, i) => {
        const bh = Math.max(Math.round((v / maxVal2) * chartH2), v > 0 ? 4 : 0);
        const x  = padX2 + i * slotW2 + (slotW2 - barW2) / 2;
        const barTop = padT2 + chartH2 - bh;
        const isLast = i === n2 - 1;

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x.toFixed(1));
        rect.setAttribute('y', barTop.toFixed(1));
        rect.setAttribute('width', barW2.toFixed(1));
        rect.setAttribute('height', bh.toFixed(1));
        rect.setAttribute('fill', isLast ? '#5b52e8' : '#c8c5f5');
        rect.setAttribute('rx', '3');
        svgEl.appendChild(rect);

        if(v > 0) {
          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', (x + barW2/2).toFixed(1));
          txt.setAttribute('y', (barTop - 5).toFixed(1));
          txt.setAttribute('text-anchor', 'middle');
          txt.setAttribute('font-size', '11');
          txt.setAttribute('font-weight', '500');
          txt.setAttribute('font-family', FONT);
          txt.setAttribute('fill', isLast ? '#5b52e8' : '#9996b0');
          txt.textContent = v;
          svgEl.appendChild(txt);
        }

        if(i === 0 || i === n2-1) {
          const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          lbl.setAttribute('x', (x + barW2/2).toFixed(1));
          lbl.setAttribute('y', (svgH2 - 4).toFixed(1));
          lbl.setAttribute('text-anchor', i===0 ? 'start' : 'end');
          lbl.setAttribute('font-size', '10');
          lbl.setAttribute('font-weight', '400');
          lbl.setAttribute('font-family', FONT);
          lbl.setAttribute('fill', '#9996b0');
          lbl.textContent = `${days[i].getMonth()+1}/${days[i].getDate()}`;
          svgEl.appendChild(lbl);
        }
      });
    }

    // ── ドーナツチャート（選択式設問を集計） ──
    const donutQ = questions.find(q => ['radio','select','checkbox'].includes(q.type));
    const donutWrap = document.getElementById('donut-wrap');
    if(donutQ && qStats[donutQ.id]?.values.length) {
      const vals = qStats[donutQ.id].values;
      const counts = {};
      vals.forEach(v => counts[v] = (counts[v]||0) + 1);
      const total_d = vals.length;
      const DCOLORS = ['#5b52e8','#7c75ef','#aba8bb','#e24b4a','#c8c5f5','#0f6e56'];
      const entries = Object.entries(counts);
      const circumference = 2 * Math.PI * 28;
      let offset = -44;
      const segments = entries.map(([label, count], i) => {
        const pct  = count / total_d;
        const dash = (pct * circumference).toFixed(1);
        const gap  = (circumference - pct * circumference).toFixed(1);
        const seg  = `<circle cx="40" cy="40" r="28" fill="none" stroke="${DCOLORS[i%DCOLORS.length]}" stroke-width="14" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round"/>`;
        offset -= pct * circumference;
        return { seg, label, count, pct: Math.round(pct*100), color: DCOLORS[i%DCOLORS.length] };
      });
      document.getElementById('donut-title').innerHTML = `${donutQ.title} <span>n=${total}</span>`;
      donutWrap.innerHTML = `
        <svg viewBox="0 0 80 80" style="width:80px;height:80px;flex-shrink:0;">
          <circle cx="40" cy="40" r="28" fill="none" stroke="#e8ecff" stroke-width="14"/>
          ${segments.map(s=>s.seg).join('')}
          <text x="40" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1825">${total_d}</text>
        </svg>
        <div class="donut-legend">
          ${segments.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${s.color};border-radius:50%;width:8px;height:8px;flex-shrink:0;"></div>${s.label} — ${s.count}件 (${s.pct}%)</div>`).join('')}
        </div>`;
    } else {
      donutWrap.innerHTML = '<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3);">集計データがありません</div>';
    }

    const COLORS = ['#5b52e8','#0f6e56','#993556','#185fa5','#854f0b','#e0851a'];
    window._dashCOLORS = COLORS;
    // 最新順で表示（responses はすでに finished_at.desc で取得済み）
    dashRenderTable(responses);

  } catch(e) {
    console.error('dashboard load error:', e);
  }
}

// ── 動的列管理（dashboard用）──
const DASH_MAX_COLS = 3;
let dashCurrentRows  = [];

// ── 列選択の永続化 ──
const DASH_STORAGE_KEY = 'dash_selected_cols_' + (new URLSearchParams(location.search).get('id') || 'default');

function dashSaveCols() {
  try { localStorage.setItem(DASH_STORAGE_KEY, JSON.stringify(dashSelectedCols.map(c => c.q.id))); } catch(e) {}
}

function dashLoadCols() {
  try {
    const saved = JSON.parse(localStorage.getItem(DASH_STORAGE_KEY) || '[]');
    const qs = dashGetAnswerableQs();
    dashSelectedCols = saved
      .map(id => { const q = qs.find(q => q.id === id); return q ? { q } : null; })
      .filter(Boolean)
      .slice(0, DASH_MAX_COLS);
  } catch(e) { dashSelectedCols = []; }
}

let dashSelectedCols = [];
const DASH_NON_DISPLAY = new Set(['cover','description','image','video','url','page_break','branch']);

function dashGetAnswerableQs() {
  return (window._dashQuestions||[]).filter(q => !DASH_NON_DISPLAY.has(q.type));
}

function dashGetAnswerLabel(q, val) {
  if (!val) return '—';
  if (q.type === 'text' || q.type === 'textarea') {
    return val.length > 30 ? val.slice(0,30) + '…' : val;
  }
  if (q.type === 'matrix' || q.type === 'matrix_multi') {
    try {
      const parsed = JSON.parse(val);
      const mRows = (q.options||[]).filter(o=>o.option_type==='matrix_row').sort((a,b)=>a.position-b.position);
      return mRows.map((row,ri) => {
        const ans = parsed[ri] || parsed[String(ri)] || parsed[row.label] || '';
        const arr = Array.isArray(ans) ? ans : (ans ? [ans] : []);
        return arr.length ? row.label + '：' + arr.join('/') : null;
      }).filter(Boolean).join('、') || '—';
    } catch(e) { return val; }
  }
  return val.length > 24 ? val.slice(0,24) + '…' : val;
}

function buildColDropdown() {
  const list = document.getElementById('colDropdownList');
  const qs = dashGetAnswerableQs();
  const selectedIds = new Set(dashSelectedCols.map(c => c.q.id));
  const atMax = dashSelectedCols.length >= DASH_MAX_COLS;
  list.innerHTML = qs.map((q, i) => {
    const isSelected = selectedIds.has(q.id);
    const disabled   = atMax && !isSelected;
    const label      = `Q${i+1}：${q.title || '（無題）'}`;
    const bg     = isSelected ? 'var(--accent-light)' : disabled ? '#f5f5f5' : '';
    const color  = isSelected ? 'var(--accent)' : disabled ? 'var(--text3)' : '#1a1825';
    const cursor = disabled ? 'default' : 'pointer';
    return `<div onclick="${disabled ? '' : isSelected ? `dashRemoveCol('${q.id}')` : `dashAddCol(${i})`}"
      style="padding:9px 12px;font-size:12px;background:${bg};color:${color};cursor:${cursor};display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);">
      <span style="flex:1;">${label}</span>
      ${isSelected ? '<span style="font-size:16px;line-height:1;color:var(--accent);">✓</span>' : ''}
    </div>`;
  }).join('');
}

function toggleColDropdown() {
  const dd = document.getElementById('colDropdown');
  if (dd.style.display === 'none') {
    buildColDropdown();
    dd.style.display = 'block';
  } else {
    dd.style.display = 'none';
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('#addColBtn') && !e.target.closest('#colDropdown')) {
    const dd = document.getElementById('colDropdown');
    if (dd) dd.style.display = 'none';
  }
});

function dashAddCol(qIdx) {
  if (dashSelectedCols.length >= DASH_MAX_COLS) return;
  const q = dashGetAnswerableQs()[qIdx];
  if (!q || dashSelectedCols.find(c => c.q.id === q.id)) return;
  dashSelectedCols.push({ qIdx, q });
  dashSaveCols();
  dashUpdateTableHead();
  dashRenderTable(dashCurrentRows);
  buildColDropdown();
}

function dashRemoveCol(qId) {
  dashSelectedCols = dashSelectedCols.filter(c => c.q.id !== qId);
  dashSaveCols();
  dashUpdateTableHead();
  dashRenderTable(dashCurrentRows);
  buildColDropdown();
}

function dashUpdateTableHead() {
  const head = document.getElementById('respTableHead');
  const aqList = dashGetAnswerableQs();
  const dynCols = dashSelectedCols.map(c => {
    const qIdx = aqList.findIndex(q => q.id === c.q.id);
    const label = `Q${qIdx+1}：${c.q.title || '（無題）'}`;
    return `<th style="white-space:nowrap;max-width:160px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="overflow:hidden;text-overflow:ellipsis;">${label}</span>
        <span onclick="dashRemoveCol('${c.q.id}')" style="cursor:pointer;color:var(--text3);font-size:14px;line-height:1;flex-shrink:0;" title="列を削除">✕</span>
      </div>
    </th>`;
  }).join('');
  head.innerHTML = `
    <th style="white-space:nowrap;">回答者</th>
    <th style="white-space:nowrap;">回答日時</th>
    ${dynCols}
    <th style="text-align:right;white-space:nowrap;">操作</th>
  `;
}

function dashRenderTable(rows) {
  dashCurrentRows = rows;
  const tbody  = document.getElementById('respTableBody');
  const COLORS = window._dashCOLORS || ['#5b52e8','#0f6e56','#993556','#185fa5','#854f0b','#e0851a'];
  const colSpan = 3 + dashSelectedCols.length;
  if (!rows || !rows.length) {
    tbody.innerHTML = `<tr><td colspan="${colSpan}" style="text-align:center;padding:24px;color:var(--text3);">回答がまだありません</td></tr>`;
    return;
  }
  const answers = window._dashAnswers || [];
  tbody.innerHTML = rows.map((r, i) => {
    const rAnswers = answers.filter(a => a.response_id === r.id);
    const ansMap   = {};
    rAnswers.forEach(a => { ansMap[a.question_id] = a; });
    const date = new Date(r.finished_at).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const name = r.respondent_name || `回答者 ${i+1}`;
    const col  = COLORS[i % COLORS.length];

    const dynCells = dashSelectedCols.map(c => {
      const ans   = ansMap[c.q.id];
      const val   = ans?.value || '';
      const label = dashGetAnswerLabel(c.q, val);
      const isEmpty = !val;
      return `<td style="font-size:12px;color:${isEmpty?'var(--text3)':'var(--text2)'};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${val.replace(/"/g,'&quot;')}">${label}</td>`;
    }).join('');

    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px;">
        <div class="avatar-sm" style="background:${col};">${name.charAt(0)}</div>${name}
      </div></td>
      <td style="color:var(--text3);font-size:11px;white-space:nowrap;">${date}</td>
      ${dynCells}
      <td style="text-align:right;">
        <button style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--accent);" onclick="openDetail(this,${JSON.stringify(rAnswers).replace(/"/g,'&quot;')})">詳細 ↗</button>
      </td>
    </tr>`;
  }).join('');
}

function goRespondents() {
  const id = new URLSearchParams(location.search).get('id') || SURVEY_ID_D;
  location.href = id ? `respondents.html?id=${id}` : 'respondents.html';
}

// 初回ロード
loadDashboard();

</script>

<script>
let detailAnswers = [];
function openDetail(btn, answersJson) {
  try {
    detailAnswers = typeof answersJson === 'string'
      ? JSON.parse(answersJson.replace(/&quot;/g, '"'))
      : (answersJson || []);
  } catch(e) { detailAnswers = []; }
  const row = btn.closest('tr');
  const name = row.querySelector('td:first-child')?.textContent?.trim() || '回答者';
  const date = row.querySelector('td:nth-child(6)')?.textContent?.trim() || '—';
  document.getElementById('detailName').textContent = name + ' の回答';
  document.getElementById('detailBody').innerHTML = detailAnswers.length
    ? detailAnswers.map((a, i) => `
        <div style="background:#f8f7fc;border-radius:8px;padding:12px;">
          <div style="font-size:10px;color:#aba8bb;margin-bottom:4px;">設問 ${i+1}</div>
          <div style="font-size:13px;color:#1a1825;line-height:1.5;">${a.value || (a.values||[]).join(', ') || '（未回答）'}</div>
        </div>`).join('')
    : '<div style="color:#aba8bb;text-align:center;padding:16px;">回答データがありません</div>';
  document.getElementById('detailModal').style.display = 'flex';
}
document.getElementById('detailModal').addEventListener('click', function(e){
  if(e.target===this) this.style.display='none';
});
</script>
