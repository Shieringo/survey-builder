<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答データ — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#5b52e8;--accent-light:#ede9ff;--success:#22a06b;--warn:#e0851a;--danger:#e24b4a;--bg:#f4f3f8;--surface:#fff;--surface2:#f8f7fc;--border:rgba(0,0,0,.08);--text:#1a1825;--text2:#6b677e;--text3:#aba8bb;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(91,82,232,.08);--font:'DM Sans','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;background:#1a1825;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(91,82,232,.35) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{font-size:15px;font-weight:500;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;margin-left:34px;}
.sb-nav{padding:10px 0;flex:1;}
.sb-sec{padding:10px 10px 4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin:1px 6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:rgba(91,82,232,.25);color:#fff;border-left:2px solid #7c75ef;}
.sb-item svg{width:13px;height:13px;opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-badge{margin-left:auto;font-size:10px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;}
.sb-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.sb-user .name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;}
.sb-user .role{font-size:9px;color:rgba(255,255,255,.3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:500;flex:1;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn svg{width:12px;height:12px;}

/* BODY */
.body{flex:1;overflow-y:auto;padding:20px;}
.body::-webkit-scrollbar{width:5px;}
.body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.kpi-num{font-size:24px;font-weight:700;color:var(--text);}

/* TABLE */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.table-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:13px;font-weight:500;}
.search{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;width:200px;}
.search:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;color:var(--text3);text-align:left;padding:9px 16px;border-bottom:1px solid var(--border);font-weight:500;background:var(--surface2);white-space:nowrap;}
td{font-size:12px;color:var(--text2);padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover td{background:var(--surface2);cursor:pointer;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-green{background:#e4f9f1;color:#1a8c5e;}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.badge-red{background:#fce8e8;color:#b03030;}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;}

/* MINI BAR */
.mini-bar-wrap{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:3px;background:var(--accent);}

.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.icon-btn svg{width:12px;height:12px;color:var(--text2);}
.icon-btn:hover svg{color:var(--accent);}

/* ── 回答者詳細モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(26,24,37,.5);align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.22);display:flex;flex-direction:column;margin:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-head-title{font-size:14px;font-weight:500;color:var(--text);}
.modal-close{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;line-height:1;padding:2px 6px;border-radius:5px;}
.modal-close:hover{background:var(--surface2);}
.modal-body{padding:20px;overflow-y:auto;max-height:70vh;}
.modal-body::-webkit-scrollbar{width:5px;}
.modal-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px;}
.resp-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.resp-meta-item{font-size:12px;color:var(--text2);}
.resp-meta-item strong{color:var(--text);font-weight:500;}
.ans-block{margin-bottom:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);}
.ans-q{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px;letter-spacing:.04em;}
.ans-label{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.5;white-space:pre-wrap;}
.ans-val{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;}
.ans-val-empty{font-size:12px;color:var(--text3);font-style:italic;}
.matrix-mini{border-collapse:collapse;width:100%;font-size:11px;margin-top:4px;}
.matrix-mini th{text-align:center;padding:4px 8px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-weight:500;}
.matrix-mini td{padding:4px 8px;border:1px solid var(--border);color:var(--text2);}
.matrix-mini td:first-child{color:var(--text);font-weight:500;}
.matrix-mini tr:nth-child(even) td{background:#f1f0f8;}
/* CSV選択モーダル */
.csv-modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(26,24,37,.5);align-items:center;justify-content:center;}
.csv-modal-overlay.open{display:flex;}
.csv-modal-box{background:var(--surface);border-radius:var(--radius);width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.22);overflow:hidden;}
.csv-modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.csv-modal-head-title{font-size:14px;font-weight:500;}
.csv-modal-body{padding:20px;}
.csv-survey-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;}
.csv-survey-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;}
.csv-survey-item:hover{border-color:var(--accent);background:var(--accent-light);}
.csv-survey-item-title{font-size:13px;font-weight:500;color:var(--text);}
.csv-survey-item-count{font-size:11px;color:var(--text3);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-row">
        <div class="logo-icon"><svg viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h7M2 11h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span class="logo-text">Survey Builder</span>
      </div>
      <div class="logo-sub">アンケートビルダー</div>
    </div>
    <div class="sb-nav">
      <div class="sb-sec">メニュー</div>
      <div class="sb-item" onclick="location.href='list.html'">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        アンケート一覧
      </div>
      <div class="sb-item active" onclick="location.href='responses.html'">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V6l4-3 4 3v6H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 12V8h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        回答データ
      </div>
      <div class="sb-item" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.21 2.686-4 6-4s6 1.79 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        回答者一覧
      </div>
      <div class="sb-sec" style="margin-top:6px;">アンケート</div>
      <div id="sb-survey-list"></div>
      <div class="sb-item" onclick="location.href='index.html?new=1'" style="margin-top:4px;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">青</div>
        <div><div class="name">青木 管理者</div><div class="role">Admin</div></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">回答データ</div>
      <button class="btn" onclick="openCsvModal()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Excel出力
      </button>
      <button class="btn" onclick="openTsvModal()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        CSV

    <div class="body">
      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">総回答数</div>
          <div class="kpi-num" id="kpi-total">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">回答のあるアンケート</div>
          <div class="kpi-num" id="kpi-surveys" style="color:var(--accent);">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">今週の新着</div>
          <div class="kpi-num" id="kpi-week" style="color:var(--success);">—</div>

      <!-- アンケート別回答一覧 -->
      <div class="card">
        <div class="table-header">
          <div class="table-title" id="table-title">アンケート別 回答データ</div>

          <tbody id="responseTable">
            <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3);">読み込み中...</td></tr>

<!-- 回答者一覧・詳細モーダル -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title" id="detailModalTitle">回答詳細</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody">
      <div style="text-align:center;padding:32px;color:var(--text3);">読み込み中...</div>
    </div>
  </div>
</div>

<!-- Excel出力 アンケート選択モーダル -->
<div class="csv-modal-overlay" id="csvModal" onclick="if(event.target===this)closeCsvModal()">
  <div class="csv-modal-box">
    <div class="csv-modal-head">
      <div class="csv-modal-head-title">Excelを出力するアンケートを選択</div>
      <button class="modal-close" onclick="closeCsvModal()">✕</button>
    </div>
    <div class="csv-modal-body">
      <div class="csv-survey-list" id="csvSurveyList">
        <div style="text-align:center;padding:16px;color:var(--text3);">読み込み中...</div>
      </div>
    </div>
  </div>
</div>

<!-- CSV出力 アンケート選択モーダル（専用） -->
<div class="csv-modal-overlay" id="tsvModal" onclick="if(event.target===this)closeTsvModal()">
  <div class="csv-modal-box">
    <div class="csv-modal-head">
      <div class="csv-modal-head-title">CSVを出力するアンケートを選択</div>
      <button class="modal-close" onclick="closeTsvModal()">✕</button>
    </div>
    <div class="csv-modal-body">
      <div class="csv-survey-list" id="tsvSurveyList">
        <div style="text-align:center;padding:16px;color:var(--text3);">読み込み中...</div>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
const get = path => fetch(`${SB_URL}/rest/v1/${path}`, {
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
}).then(r => r.json());

const STATUS_LABELS = { active:'公開中', draft:'下書き', closed:'終了' };
const STATUS_CLASSES = { active:'badge-green', draft:'badge-gray', closed:'badge-red' };

let allRows = [];

async function loadResponses() {
  try {
    // 全アンケートを取得
    const surveys = await get('surveys?select=id,title,status,created_at&order=created_at.desc');

    // 各アンケートの回答数・最終回答日を取得
    const stats = await Promise.all(surveys.map(async s => {
      const responses = await get(`responses?survey_id=eq.${s.id}&completed=eq.true&select=id,finished_at&order=finished_at.desc`);
      const lastDate = responses[0]?.finished_at || null;
      return { surveyId: s.id, count: responses.length, lastDate };
    }));

    // KPI計算
    const totalResp = stats.reduce((a,s) => a + s.count, 0);
    const surveysWithResp = stats.filter(s => s.count > 0).length;
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
    const weekCount = stats.reduce((a, s) => {
      if(s.lastDate && new Date(s.lastDate) > weekAgo) return a + s.count;
      return a;
    }, 0);

    document.getElementById('kpi-total').textContent = totalResp;
    document.getElementById('kpi-surveys').textContent = surveysWithResp;
    document.getElementById('kpi-week').textContent = weekCount;
    document.getElementById('table-title').textContent = `アンケート別 回答データ（${surveys.length}件）`;

    // テーブル描画
    allRows = surveys.map((s, i) => ({ survey: s, stat: stats[i] }));
    renderTable(allRows);

  } catch(e) {
    console.error('loadResponses error:', e);
    document.getElementById('responseTable').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--danger);">読み込みエラー</td></tr>';
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('responseTable');
  if(!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3);">データがありません</td></tr>';
    return;
  }
  const maxCount = Math.max(...rows.map(r => r.stat.count), 1);
  tbody.innerHTML = rows.map(({ survey: s, stat }) => {
    const sc = STATUS_CLASSES[s.status] || 'badge-gray';
    const sl = STATUS_LABELS[s.status] || '不明';
    const dotColor = s.status==='active' ? '#22a06b' : s.status==='closed' ? '#e24b4a' : '#aba8bb';
    const lastDate = stat.lastDate
      ? new Date(stat.lastDate).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';
    const barPct = maxCount > 0 ? Math.round(stat.count / maxCount * 100) : 0;
    return `<tr class="clickable" onclick="location.href='dashboard.html?id=${s.id}'">
      <td style="font-weight:500;color:var(--text);">${s.title}</td>
      <td><span class="badge ${sc}"><span class="status-dot" style="background:${dotColor};"></span>${sl}</span></td>
      <td><span style="font-weight:600;color:${stat.count>0?'var(--accent)':'var(--text3)'};">${stat.count}件</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${barPct}%;"></div></div>
          <span style="font-size:11px;color:var(--text3);">${barPct}%</span>
        </div>
      </td>
      <td style="color:var(--text3);font-size:11px;">${lastDate}</td>
      <td style="text-align:right;">
        <div style="display:flex;gap:4px;justify-content:flex-end;">
          <div class="icon-btn" title="詳細を見る" onclick="event.stopPropagation();location.href='dashboard.html?id=${s.id}'">
            <svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 11c0-2 2-3 5-3s5 1 5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </div>
          <div class="icon-btn" title="編集" onclick="event.stopPropagation();location.href='index.html?id=${s.id}'">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 9.5l1.5-1.5 5-5 1.5 1.5-5 5L2 9.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterRows(q) {
  const filtered = allRows.filter(r => r.survey.title.toLowerCase().includes(q.toLowerCase()));
  renderTable(filtered);
}

const NON_ANSWER_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);

async function openRespondentList(surveyId, surveyTitle) {
  const modal = document.getElementById('detailModal');
  const body  = document.getElementById('detailModalBody');
  document.getElementById('detailModalTitle').textContent = surveyTitle + ' — 回答者一覧';
  body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">読み込み中...</div>';
  modal.classList.add('open');
  try {
    const responses = await get(`responses?survey_id=eq.${surveyId}&completed=eq.true&select=id,respondent_name,finished_at&order=finished_at.desc`);
    if(!responses.length) { body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">回答がまだありません</div>'; return; }
    const COLORS = ['#5b52e8','#0f6e56','#993556','#185fa5','#854f0b','#e0851a'];
    body.innerHTML = `<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${responses.length}件の回答</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${responses.map((r,i) => {
          const name = r.respondent_name || ('回答者 '+(i+1));
          const col  = COLORS[i%COLORS.length];
          const dateStr = r.finished_at ? new Date(r.finished_at).toLocaleString('ja-JP') : '—';
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <div style="width:32px;height:32px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;">${name.charAt(0)}</div>
            <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--text);">${name}</div><div style="font-size:11px;color:var(--text3);">${dateStr}</div></div>
            <button class="btn" style="font-size:11px;padding:4px 10px;flex-shrink:0;" onclick="openDetail('${r.id}','${name.replace(/'/g,"\\'")}','${surveyId}')">詳細を見る</button>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) { body.innerHTML = `<div style="color:var(--danger);padding:24px;">読み込みエラー: ${e.message}</div>`; }
}

async function openDetail(responseId, respondentName, surveyId) {
  const body = document.getElementById('detailModalBody');
  document.getElementById('detailModalTitle').textContent = respondentName + ' の回答詳細';
  body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">読み込み中...</div>';
  try {
    const [respData, questions, answers] = await Promise.all([
      get(`responses?id=eq.${responseId}&select=*`).then(r=>r[0]),
      get(`questions?survey_id=eq.${surveyId}&select=*,options(*)&order=position`),
      get(`answers?response_id=eq.${responseId}&select=*`)
    ]);
    const ansMap = {};
    answers.forEach(a => { ansMap[a.question_id] = a; });
    const date = respData?.finished_at ? new Date(respData.finished_at).toLocaleString('ja-JP') : '—';
    let html = `<div class="resp-meta"><div class="resp-meta-item"><strong>回答者</strong>：${respondentName}</div><div class="resp-meta-item"><strong>回答日時</strong>：${date}</div></div>`;
    let qNum = 0;
    questions.forEach(q => {
      if(NON_ANSWER_TYPES.has(q.type)) return;
      qNum++;
      const ans = ansMap[q.id];
      const mCols = (q.options||[]).filter(o=>o.option_type==='matrix_col').sort((a,b)=>a.position-b.position);
      const mRows = (q.options||[]).filter(o=>o.option_type==='matrix_row').sort((a,b)=>a.position-b.position);
      let valHtml = '';
      if(!ans||!ans.value) { valHtml = '<div class="ans-val-empty">（未回答）</div>'; }
      else if((q.type==='matrix'||q.type==='matrix_multi') && mRows.length && mCols.length) {
        let parsed = {}; try { parsed = JSON.parse(ans.value); } catch(e) {}
        valHtml = `<table class="matrix-mini"><tr><th style="text-align:left;min-width:120px;">子設問</th>${mCols.map(c=>`<th>${c.label}</th>`).join('')}</tr>
          ${mRows.map((row,ri) => { const rowAns=parsed[ri]||parsed[row.label]||[]; const rowArr=Array.isArray(rowAns)?rowAns:[rowAns];
            return `<tr><td>${row.label}</td>${mCols.map(c=>`<td style="text-align:center;">${(rowArr.includes(c.label)||rowArr.includes(String(mCols.indexOf(c))))?'✓':''}</td>`).join('')}</tr>`;
          }).join('')}</table>`;
      } else { valHtml = `<div class="ans-val">${ans.value}</div>`; }
      html += `<div class="ans-block"><div class="ans-q">Q${qNum}</div><div class="ans-label">${q.title||''}</div>${valHtml}</div>`;
    });
    body.innerHTML = html;
  } catch(e) { body.innerHTML = `<div style="color:var(--danger);padding:24px;">読み込みエラー: ${e.message}</div>`; }
}

function closeDetail() { document.getElementById('detailModal').classList.remove('open'); }

async function exportTsvFile(surveyId, surveyTitle) {
  closeTsvModal();
  try {
    const [questions, responses] = await Promise.all([
      get(`questions?survey_id=eq.${surveyId}&select=*,options(*)&order=position`),
      get(`responses?survey_id=eq.${surveyId}&completed=eq.true&select=id,respondent_name,finished_at&order=finished_at.asc`)
    ]);
    const answersAll = await Promise.all(responses.map(r => get(`answers?response_id=eq.${r.id}&select=*`)));
    const NON_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);
    const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
    const SP   = String.fromCharCode(0x3000);
    const TAB  = String.fromCharCode(9);
    const CRLF = String.fromCharCode(13) + String.fromCharCode(10);
    const BOM  = String.fromCharCode(0xFEFF);

    const headers = ['回答者ID', '回答日時'];
    let qNum = 0;
    answerableQs.forEach(q => {
      qNum++;
      const mRows = (q.options||[]).filter(o=>o.option_type==='matrix_row').sort((a,b)=>a.position-b.position);
      const reqMark = q.required ? ' ※必須' : '';
      const title = q.title || '';
      if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
        mRows.forEach((row,ri) => { headers.push('Q'+qNum+'S'+(ri+1)+SP+title+reqMark+' '+(ri+1)+'．'+row.label); });
      } else if (q.type==='text'||q.type==='textarea') {
        headers.push('Q'+qNum+'S1FA'+SP+title+' ご回答');
      } else {
        headers.push('Q'+qNum+SP+title);
      }
    });

    const dataRows = responses.map((resp,ri) => {
      const ansMap = {};
      (answersAll[ri]||[]).forEach(a => { ansMap[a.question_id]=a; });
      const row = [ri+1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];
      answerableQs.forEach(q => {
        const val = ansMap[q.id] ? (ansMap[q.id].value||'') : '';
        const mRows = (q.options||[]).filter(o=>o.option_type==='matrix_row').sort((a,b)=>a.position-b.position);
        if ((q.type==='matrix'||q.type==='matrix_multi') && mRows.length) {
          let parsed={}; try{parsed=JSON.parse(val);}catch(e){}
          mRows.forEach((mrow,ri2) => {
            const ans=parsed[ri2]||parsed[String(ri2)]||parsed[mrow.label]||'';
            const arr=Array.isArray(ans)?ans:(ans?[ans]:[]);
            row.push(arr.join('/'));
          });
        } else { row.push(val); }
      });
      return row;
    });

    const sanitize = v => String(v).split(TAB).join(' ').split(String.fromCharCode(13)).join(' ').split(String.fromCharCode(10)).join(' ');
    const lines = [headers,...dataRows].map(r => r.map(sanitize).join(TAB));
    const blob = new Blob([BOM+lines.join(CRLF)], {type:'text/tab-separated-values;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=surveyTitle+'_回答データ_'+new Date().toISOString().slice(0,10)+'.tsv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { console.error(e); alert('CSV出力エラー: '+e.message); }
}

async function exportCSV(surveyId, surveyTitle) {
  closeCsvModal();
  try {
    const [questions, responses] = await Promise.all([
      get(`questions?survey_id=eq.${surveyId}&select=*,options(*)&order=position`),
      get(`responses?survey_id=eq.${surveyId}&completed=eq.true&select=id,respondent_name,finished_at&order=finished_at.asc`)
    ]);
    const answersAll = await Promise.all(
      responses.map(r => get(`answers?response_id=eq.${r.id}&select=*`))
    );

    const NON_TYPES = new Set(['cover','description','image','video','url','page_break','branch']);
    const answerableQs = questions.filter(q => !NON_TYPES.has(q.type));
    const SP = String.fromCharCode(0x3000);

    // ── ヘッダー生成 ──
    const headers = ['回答者ID', '回答日時'];
    let qNum = 0;
    answerableQs.forEach(function(q) {
      qNum++;
      const mRows = (q.options||[])
        .filter(o => o.option_type === 'matrix_row')
        .sort((a,b) => a.position - b.position);
      const reqMark = q.required ? ' ※必須' : '';
      const title = q.title || '';
      if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
        mRows.forEach((row, ri) => {
          headers.push('Q' + qNum + 'S' + (ri+1) + SP + title + reqMark + ' ' + (ri+1) + '．' + row.label);
        });
      } else if (q.type === 'text' || q.type === 'textarea') {
        headers.push('Q' + qNum + 'S1FA' + SP + title + ' ご回答');
      } else {
        headers.push('Q' + qNum + SP + title);
      }
    });

    // ── データ行生成 ──
    const dataRows = responses.map((resp, ri) => {
      const ansMap = {};
      (answersAll[ri]||[]).forEach(a => { ansMap[a.question_id] = a; });
      const row = [ri + 1, resp.finished_at ? new Date(resp.finished_at).toLocaleString('ja-JP') : ''];
      answerableQs.forEach(q => {
        const val = ansMap[q.id] ? (ansMap[q.id].value || '') : '';
        const mRows = (q.options||[])
          .filter(o => o.option_type === 'matrix_row')
          .sort((a,b) => a.position - b.position);
        if ((q.type === 'matrix' || q.type === 'matrix_multi') && mRows.length) {
          // JSON { row_index: col_label } から列ラベル（選択肢テキスト）を取得
          let parsed = {};
          try { parsed = JSON.parse(val); } catch(e) {}
          mRows.forEach((mrow, ri2) => {
            const ans = parsed[ri2] || parsed[String(ri2)] || parsed[mrow.label] || '';
            const ansArr = Array.isArray(ans) ? ans : (ans ? [ans] : []);
            row.push(ansArr.join('/'));
          });
        } else {
          row.push(val);
        }
      });
      return row;
    });

    // ── SheetJS で xlsx 生成 ──
    const wsData = [headers, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // 列幅 88px 固定（SheetJS は文字数単位: 88px÷7≒13）
    const colCount = headers.length;
    ws['!cols'] = Array(colCount).fill({ wch: 8.10 });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '回答データ');
    XLSX.writeFile(wb, surveyTitle + '_回答データ_' + new Date().toISOString().slice(0,10) + '.xlsx');

  } catch(e) {
    console.error(e);
    alert('Excel出力エラー: ' + e.message);
  }
}
