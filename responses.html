<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答データ — Survey Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#5b52e8;--accent-light:#ede9ff;--success:#22a06b;--warn:#e0851a;--danger:#e24b4a;--bg:#f4f3f8;--surface:#fff;--surface2:#f8f7fc;--border:rgba(0,0,0,.08);--text:#1a1825;--text2:#6b677e;--text3:#aba8bb;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(91,82,232,.08);--font:'DM Sans','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:220px;background:#1a1825;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(91,82,232,.35) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{font-size:15px;font-weight:500;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;margin-left:34px;}
.sb-nav{padding:10px 0;flex:1;}
.sb-sec{padding:10px 10px 4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin:1px 6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:rgba(91,82,232,.25);color:#fff;border-left:2px solid #7c75ef;}
.sb-item svg{width:13px;height:13px;opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-badge{margin-left:auto;font-size:10px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;}
.sb-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.sb-user .name{font-size:11px;color:rgba(255,255,255,.8);font-weight:500;}
.sb-user .role{font-size:9px;color:rgba(255,255,255,.3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:500;flex:1;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn svg{width:12px;height:12px;}

/* BODY */
.body{flex:1;overflow-y:auto;padding:20px;}
.body::-webkit-scrollbar{width:5px;}
.body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.kpi-num{font-size:24px;font-weight:700;color:var(--text);}

/* TABLE */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.table-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:13px;font-weight:500;}
.search{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-family:var(--font);background:var(--surface2);color:var(--text);outline:none;width:200px;}
.search:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;color:var(--text3);text-align:left;padding:9px 16px;border-bottom:1px solid var(--border);font-weight:500;background:var(--surface2);white-space:nowrap;}
td{font-size:12px;color:var(--text2);padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover td{background:var(--surface2);cursor:pointer;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-green{background:#e4f9f1;color:#1a8c5e;}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.badge-red{background:#fce8e8;color:#b03030;}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;}

/* MINI BAR */
.mini-bar-wrap{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:3px;background:var(--accent);}

.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.icon-btn svg{width:12px;height:12px;color:var(--text2);}
.icon-btn:hover svg{color:var(--accent);}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-row">
        <div class="logo-icon"><svg viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h7M2 11h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        <span class="logo-text">Survey Builder</span>
      </div>
      <div class="logo-sub">アンケートビルダー</div>
    </div>
    <div class="sb-nav">
      <div class="sb-sec">メニュー</div>
      <div class="sb-item" onclick="location.href='list.html'">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        アンケート一覧
      </div>
      <div class="sb-item active" onclick="location.href='responses.html'">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V6l4-3 4 3v6H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 12V8h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        回答データ
      </div>
      <div class="sb-item" onclick="location.href='respondents.html'">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.21 2.686-4 6-4s6 1.79 6 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        回答者一覧
      </div>
      <div class="sb-sec" style="margin-top:6px;">アンケート</div>
      <div id="sb-survey-list"></div>
      <div class="sb-item" onclick="location.href='index.html?new=1'" style="margin-top:4px;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        新規作成
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">青</div>
        <div><div class="name">青木 管理者</div><div class="role">Admin</div></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">回答データ</div>
      <button class="btn" onclick="exportCSV()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        CSV出力
      </button>
    </div>

    <div class="body">
      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">総回答数</div>
          <div class="kpi-num" id="kpi-total">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">回答のあるアンケート</div>
          <div class="kpi-num" id="kpi-surveys" style="color:var(--accent);">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">今週の新着</div>
          <div class="kpi-num" id="kpi-week" style="color:var(--success);">—</div>
        </div>
      </div>

      <!-- アンケート別回答一覧 -->
      <div class="card">
        <div class="table-header">
          <div class="table-title" id="table-title">アンケート別 回答データ</div>
          <input class="search" placeholder="🔍  アンケート名で検索..." oninput="filterRows(this.value)" />
        </div>
        <table>
          <thead>
            <tr>
              <th>アンケート名</th>
              <th>ステータス</th>
              <th>回答数</th>
              <th>回答率の目安</th>
              <th>最終回答日</th>
              <th style="text-align:right;">操作</th>
            </tr>
          </thead>
          <tbody id="responseTable">
            <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3);">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://sqagawuubujrcyxkmwbg.supabase.co';
const SB_KEY = 'sb_publishable_wmDriUhLXbcQcdd5UZMivQ_k7oe2HYC';
const get = path => fetch(`${SB_URL}/rest/v1/${path}`, {
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
}).then(r => r.json());

const STATUS_LABELS = { active:'公開中', draft:'下書き', closed:'終了' };
const STATUS_CLASSES = { active:'badge-green', draft:'badge-gray', closed:'badge-red' };

let allRows = [];

async function loadResponses() {
  try {
    // 全アンケートを取得
    const surveys = await get('surveys?select=id,title,status,created_at&order=created_at.desc');

    // 各アンケートの回答数・最終回答日を取得
    const stats = await Promise.all(surveys.map(async s => {
      const responses = await get(`responses?survey_id=eq.${s.id}&completed=eq.true&select=id,finished_at&order=finished_at.desc`);
      const lastDate = responses[0]?.finished_at || null;
      return { surveyId: s.id, count: responses.length, lastDate };
    }));

    // KPI計算
    const totalResp = stats.reduce((a,s) => a + s.count, 0);
    const surveysWithResp = stats.filter(s => s.count > 0).length;
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
    const weekCount = stats.reduce((a, s) => {
      if(s.lastDate && new Date(s.lastDate) > weekAgo) return a + s.count;
      return a;
    }, 0);

    document.getElementById('kpi-total').textContent = totalResp;
    document.getElementById('kpi-surveys').textContent = surveysWithResp;
    document.getElementById('kpi-week').textContent = weekCount;
    document.getElementById('table-title').textContent = `アンケート別 回答データ（${surveys.length}件）`;

    // テーブル描画
    allRows = surveys.map((s, i) => ({ survey: s, stat: stats[i] }));
    renderTable(allRows);

  } catch(e) {
    console.error('loadResponses error:', e);
    document.getElementById('responseTable').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--danger);">読み込みエラー</td></tr>';
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('responseTable');
  if(!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3);">データがありません</td></tr>';
    return;
  }
  const maxCount = Math.max(...rows.map(r => r.stat.count), 1);
  tbody.innerHTML = rows.map(({ survey: s, stat }) => {
    const sc = STATUS_CLASSES[s.status] || 'badge-gray';
    const sl = STATUS_LABELS[s.status] || '不明';
    const dotColor = s.status==='active' ? '#22a06b' : s.status==='closed' ? '#e24b4a' : '#aba8bb';
    const lastDate = stat.lastDate
      ? new Date(stat.lastDate).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';
    const barPct = maxCount > 0 ? Math.round(stat.count / maxCount * 100) : 0;
    return `<tr class="clickable" onclick="location.href='dashboard.html?id=${s.id}'">
      <td style="font-weight:500;color:var(--text);">${s.title}</td>
      <td><span class="badge ${sc}"><span class="status-dot" style="background:${dotColor};"></span>${sl}</span></td>
      <td><span style="font-weight:600;color:${stat.count>0?'var(--accent)':'var(--text3)'};">${stat.count}件</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${barPct}%;"></div></div>
          <span style="font-size:11px;color:var(--text3);">${barPct}%</span>
        </div>
      </td>
      <td style="color:var(--text3);font-size:11px;">${lastDate}</td>
      <td style="text-align:right;">
        <div style="display:flex;gap:4px;justify-content:flex-end;">
          <div class="icon-btn" title="回答者を見る" onclick="event.stopPropagation();location.href='respondents.html?id=${s.id}'">
            <svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 11c0-2 2-3 5-3s5 1 5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </div>
          <div class="icon-btn" title="集計を見る" onclick="event.stopPropagation();location.href='dashboard.html?id=${s.id}'">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 9V5l2-2 2 2 2-3 2 3v4H2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          </div>
          <div class="icon-btn" title="編集" onclick="event.stopPropagation();location.href='index.html?id=${s.id}'">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 9.5l1.5-1.5 5-5 1.5 1.5-5 5L2 9.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterRows(q) {
  const filtered = allRows.filter(r => r.survey.title.toLowerCase().includes(q.toLowerCase()));
  renderTable(filtered);
}

function exportCSV() {
  const BOM = '\uFEFF';
  const headers = ['アンケート名', 'ステータス', '回答数', '最終回答日'];
  const rows = allRows.map(({ survey: s, stat }) => [
    s.title,
    STATUS_LABELS[s.status] || '不明',
    stat.count,
    stat.lastDate ? new Date(stat.lastDate).toLocaleDateString('ja-JP') : '—'
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = BOM + [headers.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `回答データ_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// サイドバーのアンケート一覧をDBから生成
(async function() {
  try {
    const surveys = await get('surveys?select=id,title,responses(id)&order=created_at.desc&limit=10');
    const container = document.getElementById('sb-survey-list');
    if(!container || !Array.isArray(surveys)) return;
    container.innerHTML = surveys.map(s =>
      `<div class="sb-item" onclick="location.href='index.html?id=${s.id}'" title="${s.title}" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        <svg viewBox="0 0 16 16" fill="none" style="flex-shrink:0;width:13px;height:13px;"><path d="M3 3h10v10H3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6 6h4M6 9h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span style="overflow:hidden;text-overflow:ellipsis;">${s.title}</span>
      </div>`
    ).join('');
  } catch(e) { console.error('sidebar error:', e); }
})();

loadResponses();
</script>
</body>
</html>
